<style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Hide default radio buttons */
        input[type="radio"] {
            display: none;
        }

        /* Custom Radio styling applied via parent class toggle in JS */
        .option-card.selected {
            border-color: #745b00; /* primary */
            background-color: #f6f3f2; /* surface-container-low */
        }
        
        .option-card.selected .radio-circle {
            border-color: #745b00; /* primary */
            background-color: #745b00;
        }
        
        .option-card.selected .radio-circle::after {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            background-color: #ffffff;
            border-radius: 50%;

<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col items-center justify-start">
<!-- 
      Note: Global Navigation (TopAppBar/BottomNavBar) is intentionally suppressed here 
      as per the Semantic Shell Mandate for Linear/Transactional flows (2FA Setup).
    -->
<main class="w-full max-w-[500px] flex-1 flex flex-col px-container-margin-mobile py-8 md:py-12">
<!-- Minimal Header for Transactional Flow -->
<header class="flex items-center mb-8">
<button aria-label="Go back" class="p-2 -ml-2 rounded-full hover:bg-surface-variant transition-colors flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<div class="flex-1"></div> <!-- Spacer -->
</header>
<!-- Hero Illustration -->
<div class="w-24 h-24 mx-auto mb-6 rounded-full overflow-hidden shadow-sm relative" style="background: linear-gradient(135deg, #fcf9f8 0%, #ebe7e7 100%);">
<div class="absolute inset-0 flex items-center justify-center">
<span class="material-symbols-outlined text-[48px] text-tertiary" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
</div>
</div>
<!-- Typography: Header & Description -->
<h1 class="text-headline-lg-mobile font-headline-lg-mobile text-center mb-4 md:text-headline-lg md:font-headline-lg text-on-surface">
            Secure Your Account
        </h1>
<p class="text-body-lg font-body-lg text-on-surface-variant text-center mb-10">
            Two-factor authentication (2FA) adds an extra layer of security. Even if someone gets your password, they won't be able to access your account.
        </p>
<!-- Options Container -->
<div class="flex flex-col gap-4 mb-12">
<!-- Option 1: Authenticator App -->
<label class="option-card selected relative p-4 md:p-5 rounded-xl border-2 border-outline-variant bg-surface cursor-pointer transition-all duration-200 flex items-start gap-4 hover:bg-surface-container-low group">
<input checked="" name="2fa_method" type="radio" value="app"/>
<!-- Custom Radio Indicator -->
<div class="radio-circle w-6 h-6 flex-shrink-0 rounded-full border-2 border-outline-variant transition-colors mt-1"></div>
<div class="flex-1 flex flex-col">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 0;">phonelink_lock</span>
<span class="text-title-md font-title-md text-on-surface">Authenticator App</span>
</div>
<p class="text-body-sm font-body-sm text-on-surface-variant">
                        Get codes from an app like Google Authenticator or Authy. Highly secure and works offline.
                    </p>
</div>
<!-- Recommended Badge -->
<div class="absolute -top-3 right-4 bg-tertiary-container text-on-tertiary-container text-label-caps font-label-caps px-3 py-1 rounded-full shadow-sm uppercase">
                    Recommended
                </div>
</label>
<!-- Option 2: SMS -->
<label class="option-card relative p-4 md:p-5 rounded-xl border-2 border-outline-variant bg-surface cursor-pointer transition-all duration-200 flex items-start gap-4 hover:bg-surface-container-low group">
<input name="2fa_method" type="radio" value="sms"/>
<!-- Custom Radio Indicator -->
<div class="radio-circle w-6 h-6 flex-shrink-0 rounded-full border-2 border-outline-variant transition-colors mt-1"></div>
<div class="flex-1 flex flex-col">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 0;">sms</span>
<span class="text-title-md font-title-md text-on-surface">SMS / Text Message</span>
</div>
<p class="text-body-sm font-body-sm text-on-surface-variant">
                        Receive a unique 6-digit verification code via text message to your registered mobile number.
                    </p>
</div>
</label>
</div>
<!-- Action Area -->
<div class="mt-auto pt-4">
<!-- Primary Button using MTN Yellow (primary-container) and Deep Slate text -->
<button class="w-full py-4 px-6 rounded-full bg-primary-container text-on-primary-fixed text-title-md font-title-md font-bold transition-transform duration-100 active:scale-95 shadow-sm hover:shadow-md flex items-center justify-center gap-2">
                Continue
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>

</main>
<script>
        // Simple logic to toggle the visual selected state of the custom radio cards
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.option-card');
            const radios = document.querySelectorAll('input[type="radio"][name="2fa_method"]');

            cards.forEach(card => {
                card.addEventListener('click', () => {
                    // Reset all
                    cards.forEach(c => {
                        c.classList.remove('selected');
                        c.classList.remove('border-primary');
                        c.classList.add('border-outline-variant');
                    });
                    
                    // Set active
                    card.classList.add('selected');
                    card.classList.remove('border-outline-variant');
                    
                    // Ensure the hidden radio is checked
                    const input = card.querySelector('input');
                    if(input) input.checked = true;
                });
            });
        });
    </script>
