<body class="bg-background text-on-surface font-body-lg min-h-screen flex flex-col items-center justify-center p-container-margin-mobile md:p-container-margin-desktop relative overflow-hidden">
<!-- Decorative Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary-container rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-secondary-container rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
<!-- Main Container -->
<main class="w-full max-w-md relative z-10">
<!-- Header Section -->
<div class="mb-8 text-center">
<div class="w-16 h-16 bg-surface-container rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm border border-outline-variant">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="lock_person">lock_person</span>
</div>
<h1 class="text-headline-lg-mobile md:text-headline-lg font-headline-lg-mobile md:font-headline-lg text-on-surface mb-2">Setup SMS 2FA</h1>
<p class="text-body-sm font-body-sm text-on-surface-variant">Secure your account with two-factor authentication.</p>
</div>
<!-- Glassmorphic Card -->
<div class="glass-panel rounded-xl shadow-lg p-6 md:p-8 w-full border-outline-variant">
<!-- Step 1: Phone Number -->
<div class="transition-opacity duration-300 block" id="step-1">
<label class="block text-label-caps font-label-caps text-on-surface-variant mb-2 uppercase tracking-wide">Mobile Number</label>
<div class="flex flex-col sm:flex-row gap-4 mb-6">
<!-- Country Code Selector -->
<div class="relative w-full sm:w-1/3">
<select class="w-full h-12 bg-surface-container-low border border-outline-variant rounded-lg pl-3 pr-8 text-body-lg font-body-lg text-on-surface focus:border-secondary focus:ring-1 focus:ring-secondary appearance-none cursor-pointer">
<option selected="" value="+234">🇳🇬 +234</option>
<option value="+27">🇿🇦 +27</option>
<option value="+233">🇬🇭 +233</option>
<option value="+254">🇰🇪 +254</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Phone Input -->
<div class="relative w-full sm:w-2/3">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="smartphone">smartphone</span>
</div>
<input class="w-full h-12 bg-surface-container-low border border-outline-variant rounded-lg pl-10 pr-3 text-body-lg font-body-lg text-on-surface focus:border-secondary focus:ring-1 focus:ring-secondary" id="phone-input" placeholder="Enter your number" type="tel"/>
</div>
</div>
<button class="w-full h-12 bg-primary text-on-primary-fixed font-title-md text-title-md rounded-lg shadow-sm hover:bg-primary-fixed transition-colors flex items-center justify-center gap-2" id="btn-send-code" type="button">
                    Send Code
                    <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Step 2: OTP Entry (Initially Hidden) -->

<div class="mb-6">
<label class="block text-label-caps font-label-caps text-on-surface-variant mb-2 text-center uppercase tracking-wide">Enter Verification Code</label>
<p class="text-body-sm font-body-sm text-center text-on-surface-variant mb-4">We sent a 6-digit code to <span class="font-bold text-on-surface" id="display-number"></span></p>
<div class="flex justify-between gap-2 max-w-xs mx-auto mb-6">
<input class="otp-input w-12 h-14 text-center text-headline-lg font-headline-lg bg-surface-container-low border border-outline-variant rounded-lg text-on-surface focus:bg-surface" maxlength="1" type="number"/>
<input class="otp-input w-12 h-14 text-center text-headline-lg font-headline-lg bg-surface-container-low border border-outline-variant rounded-lg text-on-surface focus:bg-surface" disabled="" maxlength="1" type="number"/>
<input class="otp-input w-12 h-14 text-center text-headline-lg font-headline-lg bg-surface-container-low border border-outline-variant rounded-lg text-on-surface focus:bg-surface" disabled="" maxlength="1" type="number"/>
<input class="otp-input w-12 h-14 text-center text-headline-lg font-headline-lg bg-surface-container-low border border-outline-variant rounded-lg text-on-surface focus:bg-surface" disabled="" maxlength="1" type="number"/>
<input class="otp-input w-12 h-14 text-center text-headline-lg font-headline-lg bg-surface-container-low border border-outline-variant rounded-lg text-on-surface focus:bg-surface" disabled="" maxlength="1" type="number"/>
<input class="otp-input w-12 h-14 text-center text-headline-lg font-headline-lg bg-surface-container-low border border-outline-variant rounded-lg text-on-surface focus:bg-surface" disabled="" maxlength="1" type="number"/>

<button class="text-body-sm font-body-sm text-secondary hover:text-on-secondary-container transition-colors focus:outline-none">

                    </button>
<button class="w-full h-12 bg-transparent border border-outline-variant text-on-surface font-title-md text-title-md rounded-lg hover:bg-surface-container-low transition-colors" id="btn-back" type="button">
                        Back to Number
                    </button>
</div>

<!-- Go Back Link (Outside Card) -->

<span class="material-symbols-outlined text-sm" data-icon="arrow_back">arrow_back</span>
                Return to Security Settings
            </a>

<script>
        document.addEventListener('DOMContentLoaded', () => {
            const step1 = document.getElementById('step-1');
            const step2 = document.getElementById('step-2');
            const btnSendCode = document.getElementById('btn-send-code');
            const btnBack = document.getElementById('btn-back');
            const phoneInput = document.getElementById('phone-input');
            const displayNumber = document.getElementById('display-number');
            const otpInputs = document.querySelectorAll('.otp-input');

            // Switch to Step 2
            btnSendCode.addEventListener('click', () => {
                if(phoneInput.value.trim() !== '') {
                    // Grab country code (simplified logic)
                    const select = document.querySelector('select');
                    const countryCode = select.options[select.selectedIndex].value;
                    displayNumber.textContent = `${countryCode} ${phoneInput.value}`;
                    
                    step1.classList.add('hidden');
                    step2.classList.remove('hidden');
                    
                    // Focus first OTP input
                    setTimeout(() => otpInputs[0].focus(), 50);
                }
            });

            // Switch to Step 1
            btnBack.addEventListener('click', () => {
                step2.classList.add('hidden');
                step1.classList.remove('hidden');
                
                // Clear OTP inputs
                otpInputs.forEach((input, index) => {
                    input.value = '';
                    if(index !== 0) input.disabled = true;
                });
            });

            // OTP Input Logic
            otpInputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    // Allow only numbers
                    e.target.value = e.target.value.replace(/[^0-9]/g, '');
                    
                    if (e.target.value !== '') {
                        // Move to next input
                        if (index < otpInputs.length - 1) {
                            otpInputs[index + 1].disabled = false;
                            otpInputs[index + 1].focus();
                        }
                    }
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && e.target.value === '') {
                        // Move to previous input on backspace if current is empty
                        if (index > 0) {
                            otpInputs[index - 1].focus();
                            otpInputs[index].disabled = true;
                        }
                    }
                });
            });
        });
    </script>
