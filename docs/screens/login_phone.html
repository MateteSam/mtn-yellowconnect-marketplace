<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MTN Marketplace - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#fcf9f8",
                        "error-container": "#ffdad6",
                        "primary-container": "#ffcc00",
                        "on-secondary-fixed": "#001b3e",
                        "primary-fixed": "#ffe08b",
                        "tertiary-fixed": "#95f1ff",
                        "surface-bright": "#fcf9f8",
                        "on-secondary": "#ffffff",
                        "on-surface": "#1c1b1b",
                        "tertiary-fixed-dim": "#00daf0",
                        "on-secondary-fixed-variant": "#00458d",
                        "on-tertiary-fixed-variant": "#004f57",
                        "inverse-primary": "#f1c100",
                        "inverse-surface": "#313030",
                        "tertiary-container": "#00e7fe",
                        "on-primary-fixed-variant": "#584400",
                        "surface-tint": "#745b00",
                        "secondary-container": "#76a9ff",
                        "surface-variant": "#e5e2e1",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-highest": "#e5e2e1",
                        "on-secondary-container": "#003c7c",
                        "on-background": "#1c1b1b",
                        "on-surface-variant": "#4e4632",
                        "secondary": "#1f5dae",
                        "error": "#ba1a1a",
                        "outline": "#80765f",
                        "on-primary": "#ffffff",
                        "surface": "#fcf9f8",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#f3f0ef",
                        "tertiary": "#006874",
                        "secondary-fixed": "#d6e3ff",
                        "on-primary-fixed": "#241a00",
                        "primary": "#745b00",
                        "outline-variant": "#d2c5ab",
                        "primary-fixed-dim": "#f1c100",
                        "on-primary-container": "#6f5700",
                        "on-error-container": "#93000a",
                        "on-tertiary-container": "#00646e",
                        "surface-container-high": "#ebe7e7",
                        "surface-dim": "#dcd9d9",
                        "surface-container": "#f0edec",
                        "on-tertiary-fixed": "#001f24",
                        "secondary-fixed-dim": "#aac7ff",
                        "on-error": "#ffffff",
                        "surface-container-low": "#f6f3f2"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-gap": "48px",
                        "gutter": "16px",
                        "container-margin-desktop": "40px",
                        "base": "8px",
                        "container-margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "body-sm": ["Inter"],
                        "title-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-caps": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "title-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-container-margin-mobile md:p-container-margin-desktop selection:bg-primary-container selection:text-on-primary-container">
<main class="w-full max-w-md mx-auto bg-surface sm:border sm:border-surface-variant sm:shadow-sm sm:rounded-2xl p-6 sm:p-8 flex flex-col relative overflow-hidden">
<!-- Background subtle accent -->
<div class="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-primary-container/20 to-transparent pointer-events-none"></div>
<!-- Header -->
<header class="flex flex-col items-center mb-8 relative z-10">
<div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center mb-6 shadow-md shadow-primary-container/20 ring-4 ring-surface">
<span class="material-symbols-outlined text-4xl text-on-primary-container" style="font-variation-settings: 'FILL' 1;">storefront</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2 text-center tracking-tight">Welcome Back</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant text-center max-w-[280px]">
                Enter your phone number to access MTN Marketplace securely.
            </p>
</header>
<!-- Login Form -->
<form class="flex flex-col gap-6 relative z-10" onsubmit="event.preventDefault();">
<!-- Phone Input Group -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider ml-1" for="phone">Phone Number</label>
<div class="flex rounded-lg overflow-hidden bg-surface-container border border-transparent focus-within:border-secondary focus-within:ring-1 focus-within:ring-secondary transition-all shadow-sm">
<!-- Country Code Selector (Visual) -->
<button class="flex items-center gap-2 px-3 py-4 bg-surface-container-high border-r border-outline-variant hover:bg-surface-dim transition-colors text-on-surface shrink-0" type="button">
<span class="material-symbols-outlined text-lg text-outline">public</span>
<span class="font-title-md text-title-md">+234</span>
<span class="material-symbols-outlined text-sm text-outline">expand_more</span>
</button>
<!-- Phone Input -->
<input autocomplete="tel" class="flex-1 bg-transparent px-4 py-4 outline-none font-body-lg text-body-lg text-on-surface placeholder:text-outline w-full" id="phone" placeholder="0800 000 0000" type="tel"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container text-on-primary-container py-4 rounded-lg font-title-md text-title-md flex items-center justify-center gap-2 hover:bg-primary-fixed active:scale-[0.98] transition-all shadow-md shadow-primary-container/20 group mt-2" type="button">
                Send OTP
                <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-8 relative z-10">
<div class="flex-1 h-px bg-outline-variant/50"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Or continue with</span>
<div class="flex-1 h-px bg-outline-variant/50"></div>
</div>
<!-- Social Login -->
<div class="flex flex-col gap-3 relative z-10">
<button class="w-full flex items-center justify-center gap-3 py-3.5 rounded-lg border border-outline-variant hover:bg-surface-container-lowest hover:border-outline transition-colors bg-surface font-title-md text-title-md text-on-surface shadow-sm" type="button">
<!-- Using inline SVG for Google logo as external images might fail/be restricted in some environments, ensuring reliable render -->
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Sign in with Google
            </button>
<button class="w-full flex items-center justify-center gap-3 py-3.5 rounded-lg border border-outline-variant hover:bg-surface-container-lowest hover:border-outline transition-colors bg-surface font-title-md text-title-md text-on-surface shadow-sm" type="button">
<span class="material-symbols-outlined text-[22px]" style="font-variation-settings: 'FILL' 1;">ios</span>
                Sign in with Apple
            </button>
</div>
<!-- Alternative Signup -->
<div class="mt-10 text-center relative z-10">
<span class="font-body-lg text-body-lg text-on-surface-variant">Don't have an account?</span>
<a class="font-title-md text-title-md text-secondary hover:text-on-secondary-fixed-variant ml-1 transition-colors underline-offset-4 hover:underline" href="#">
                Sign up with email
            </a>
</div>
</main>
<!-- Interactive script for input focus effect (simulating high-trust environment) -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const phoneInput = document.getElementById('phone');
            const container = phoneInput.closest('.flex.rounded-lg');
            
            phoneInput.addEventListener('focus', () => {
                container.classList.add('shadow-md');
            });
            
            phoneInput.addEventListener('blur', () => {
                container.classList.remove('shadow-md');
            });
        });
    </script>
</body></html>
