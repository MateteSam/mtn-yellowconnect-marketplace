<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Signup - MTN Marketplace</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#fcf9f8",
                        "error-container": "#ffdad6",
                        "primary-container": "#ffcc00",
                        "on-secondary-fixed": "#001b3e",
                        "primary-fixed": "#ffe08b",
                        "tertiary-fixed": "#95f1ff",
                        "surface-bright": "#fcf9f8",
                        "on-secondary": "#ffffff",
                        "on-surface": "#1c1b1b",
                        "tertiary-fixed-dim": "#00daf0",
                        "on-secondary-fixed-variant": "#00458d",
                        "on-tertiary-fixed-variant": "#004f57",
                        "inverse-primary": "#f1c100",
                        "inverse-surface": "#313030",
                        "tertiary-container": "#00e7fe",
                        "on-primary-fixed-variant": "#584400",
                        "surface-tint": "#745b00",
                        "secondary-container": "#76a9ff",
                        "surface-variant": "#e5e2e1",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-highest": "#e5e2e1",
                        "on-secondary-container": "#003c7c",
                        "on-background": "#1c1b1b",
                        "on-surface-variant": "#4e4632",
                        "secondary": "#1f5dae",
                        "error": "#ba1a1a",
                        "outline": "#80765f",
                        "on-primary": "#ffffff",
                        "surface": "#fcf9f8",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#f3f0ef",
                        "tertiary": "#006874",
                        "secondary-fixed": "#d6e3ff",
                        "on-primary-fixed": "#241a00",
                        "primary": "#745b00",
                        "outline-variant": "#d2c5ab",
                        "primary-fixed-dim": "#f1c100",
                        "on-primary-container": "#6f5700",
                        "on-error-container": "#93000a",
                        "on-tertiary-container": "#00646e",
                        "surface-container-high": "#ebe7e7",
                        "surface-dim": "#dcd9d9",
                        "surface-container": "#f0edec",
                        "on-tertiary-fixed": "#001f24",
                        "secondary-fixed-dim": "#aac7ff",
                        "on-error": "#ffffff",
                        "surface-container-low": "#f6f3f2"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-gap": "48px",
                        "gutter": "16px",
                        "container-margin-desktop": "40px",
                        "base": "8px",
                        "container-margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "body-sm": ["Inter"],
                        "title-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-caps": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "title-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Hide scrollbar for a cleaner look if content overflows */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background antialiased min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container relative overflow-x-hidden">
<!-- Subtle Background Element -->
<div class="fixed top-0 left-0 w-full h-64 bg-gradient-to-b from-surface-container to-transparent -z-10 pointer-events-none"></div>
<div class="fixed -top-32 -right-32 w-96 h-96 bg-primary-container/10 rounded-full blur-3xl -z-10 pointer-events-none"></div>
<main class="flex-1 flex flex-col justify-center px-container-margin-mobile md:px-container-margin-desktop py-12 max-w-md mx-auto w-full z-10">
<!-- Header Section -->
<header class="mb-10 text-center flex flex-col items-center">
<!-- Simplified Brand Anchor -->
<div class="flex items-center gap-2 mb-6">
<div class="w-10 h-10 bg-primary-container rounded-lg flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-on-primary-container" data-icon="storefront">storefront</span>
</div>
<h1 class="text-title-md font-title-md text-primary tracking-tight">MTN Marketplace</h1>
</div>
<h2 class="text-headline-lg-mobile font-headline-lg-mobile text-on-surface mb-2">Create an Account</h2>
<p class="text-body-sm font-body-sm text-on-surface-variant">Join the fastest growing marketplace today.</p>
</header>
<!-- Form Section -->
<form class="space-y-5" onsubmit="event.preventDefault();">
<!-- Full Name -->
<div class="space-y-1">
<label class="block text-body-sm font-body-sm text-on-surface font-medium px-1" for="fullName">Full Name</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="person">person</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container border border-transparent rounded-lg text-body-lg font-body-lg text-on-surface placeholder:text-on-surface-variant/50 focus:bg-surface focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all duration-200" id="fullName" placeholder="e.g. John Doe" type="text"/>
</div>
</div>
<!-- Email Address -->
<div class="space-y-1">
<label class="block text-body-sm font-body-sm text-on-surface font-medium px-1" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container border border-transparent rounded-lg text-body-lg font-body-lg text-on-surface placeholder:text-on-surface-variant/50 focus:bg-surface focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all duration-200" id="email" placeholder="you@example.com" type="email"/>
</div>
</div>
<!-- Password -->
<div class="space-y-1">
<label class="block text-body-sm font-body-sm text-on-surface font-medium px-1" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</div>
<input class="w-full pl-10 pr-12 py-3 bg-surface-container border border-transparent rounded-lg text-body-lg font-body-lg text-on-surface placeholder:text-on-surface-variant/50 focus:bg-surface focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all duration-200" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant hover:text-secondary focus:outline-none transition-colors" id="togglePassword" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility" id="visibilityIcon">visibility</span>
</button>
</div>
</div>
<!-- Terms and Conditions -->
<div class="flex items-start gap-3 pt-2 pb-4">
<div class="flex items-center h-5 mt-0.5">
<input class="w-5 h-5 bg-surface-container border-outline rounded text-secondary focus:ring-secondary focus:ring-offset-background transition-colors cursor-pointer" id="terms" type="checkbox"/>
</div>
<label class="text-body-sm font-body-sm text-on-surface-variant cursor-pointer select-none" for="terms">
                    I agree to the <a class="text-secondary font-medium hover:underline" href="#">Terms &amp; Conditions</a> and <a class="text-secondary font-medium hover:underline" href="#">Privacy Policy</a>.
                </label>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container text-on-primary-container text-label-caps font-label-caps py-4 rounded-lg shadow-sm hover:shadow-md hover:bg-inverse-primary transition-all duration-200 flex justify-center items-center gap-2 active:scale-[0.98]" type="submit">
                Create Account
                <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="text-body-sm font-body-sm text-on-surface-variant">
                Already have an account? 
                <a class="text-secondary font-bold hover:underline ml-1 transition-colors" href="#">Sign in</a>
</p>
</div>
</main>
<script>
        // Password Visibility Toggle Logic
        const passwordInput = document.getElementById('password');
        const toggleButton = document.getElementById('togglePassword');
        const visibilityIcon = document.getElementById('visibilityIcon');

        toggleButton.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            if (type === 'text') {
                visibilityIcon.textContent = 'visibility_off';
                visibilityIcon.setAttribute('data-icon', 'visibility_off');
            } else {
                visibilityIcon.textContent = 'visibility';
                visibilityIcon.setAttribute('data-icon', 'visibility');
            }
        });
    </script>
</body></html>
