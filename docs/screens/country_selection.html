<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Select Country - MTN Marketplace</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                        "secondary-container": "#76a9ff",
                        "on-tertiary-fixed": "#001f24",
                        "on-error-container": "#93000a",
                        "outline-variant": "#d2c5ab",
                        "tertiary-fixed-dim": "#00daf0",
                        "on-surface": "#1c1b1b",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "primary": "#745b00",
                        "tertiary-container": "#00e7fe",
                        "surface-container-highest": "#e5e2e1",
                        "primary-fixed": "#ffe08b",
                        "background": "#fcf9f8",
                        "inverse-on-surface": "#f3f0ef",
                        "surface-bright": "#fcf9f8",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed-dim": "#aac7ff",
                        "surface-container": "#f0edec",
                        "on-tertiary-fixed-variant": "#004f57",
                        "surface-container-low": "#f6f3f2",
                        "surface": "#fcf9f8",

                        "on-primary-fixed-variant": "#584400",
                        "on-surface-variant": "#4e4632",
                        "on-primary-container": "#6f5700",
                        "secondary-fixed": "#d6e3ff",
                        "on-primary-fixed": "#241a00",
                        "secondary": "#1f5dae",
                        "tertiary-fixed": "#95f1ff",
                        "on-secondary-fixed": "#001b3e",
                        "on-primary": "#ffffff",
                        "on-background": "#1c1b1b",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#dcd9d9",
                        "on-secondary-fixed-variant": "#00458d",
                        "inverse-primary": "#f1c100",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-gap": "48px",
                        "gutter": "16px",
                        "base": "8px",
                        "container-margin-mobile": "16px",
                        "container-margin-desktop": "40px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],

<style>
        .glass-panel {
            background: rgba(252, 249, 248, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        
        /* Custom Radio Button Styling */
        input[type="radio"].mtn-radio {
            appearance: none;
            background-color: transparent;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.5em;
            height: 1.5em;
            border: 2px solid #80765f; /* outline */
            border-radius: 50%;
            display: grid;
            place-content: center;
        }

        input[type="radio"].mtn-radio::before {
            content: "";
            width: 0.85em;
            height: 0.85em;
            border-radius: 50%;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em #745b00; /* primary */
        }

        input[type="radio"].mtn-radio:checked {
            border-color: #745b00; /* primary */
        }

        input[type="radio"].mtn-radio:checked::before {
            transform: scale(1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-sans antialiased min-h-screen flex flex-col relative pb-32">
<!-- Task Header (Suppresses Nav Shell for focus) -->
<header class="sticky top-0 w-full flex justify-between items-center px-container-margin-mobile py-base bg-surface z-50 border-b border-surface-variant">
<button aria-label="Go back" class="p-2 rounded-full hover:bg-surface-container-lowest transition-colors flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
<h1 class="text-title-md font-title-md text-on-surface">Select Region</h1>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</header>
<main class="flex-1 px-container-margin-mobile pt-6 flex flex-col gap-8 max-w-[600px] mx-auto w-full">
<!-- Search & Detect Section -->
<section class="flex flex-col gap-4">
<h2 class="text-headline-lg-mobile font-headline-lg-mobile text-on-surface">Where are you browsing from?</h2>
<!-- Search Bar -->
<div class="relative w-full">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant z-10" style="font-variation-settings: 'FILL' 0;">search</span>
<input class="w-full bg-surface-container py-4 pl-12 pr-4 rounded-xl border-none text-body-lg font-body-lg text-on-surface placeholder:text-on-surface-variant focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all shadow-sm" placeholder="Search countries..." type="text"/>
</div>
<!-- AI Detect Location Button -->
<button class="w-full flex items-center justify-between p-4 rounded-xl border border-secondary-container bg-secondary-fixed/30 hover:bg-secondary-fixed/50 transition-colors group">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-secondary text-on-secondary flex items-center justify-center shadow-md">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">my_location</span>
</div>
<div class="flex flex-col items-start">
<span class="text-body-lg font-body-lg font-semibold text-secondary">Detect My Location</span>
<span class="text-body-sm font-body-sm text-on-surface-variant">Use GPS for automatic selection</span>
</div>
</div>
<span class="material-symbols-outlined text-secondary opacity-0 group-hover:opacity-100 transition-opacity -translate-x-2 group-hover:translate-x-0 duration-300">chevron_right</span>
</button>
</section>
<!-- Popular Countries List -->
<section class="flex flex-col gap-2">
<h3 class="text-label-caps font-label-caps text-on-surface-variant uppercase tracking-wider mb-2 pl-2">Popular Destinations</h3>
<div class="flex flex-col bg-surface-container-lowest rounded-xl border border-surface-variant overflow-hidden shadow-sm">
<!-- Country Item: Nigeria -->
<label class="flex items-center justify-between p-4 border-b border-surface-variant hover:bg-surface-container-low transition-colors cursor-pointer group">
<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-variant flex items-center justify-center text-xl shadow-inner">🇳🇬</div>
<span class="text-body-lg font-body-lg text-on-surface font-medium">Nigeria</span>
</div>
<input checked="" class="mtn-radio" name="country" type="radio" value="NG"/>
</label>
<!-- Country Item: Ghana -->
<label class="flex items-center justify-between p-4 border-b border-surface-variant hover:bg-surface-container-low transition-colors cursor-pointer group">
<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-variant flex items-center justify-center text-xl shadow-inner">🇬🇭</div>
<span class="text-body-lg font-body-lg text-on-surface font-medium">Ghana</span>
</div>
<input class="mtn-radio" name="country" type="radio" value="GH"/>
</label>
<!-- Country Item: South Africa -->
<label class="flex items-center justify-between p-4 border-b border-surface-variant hover:bg-surface-container-low transition-colors cursor-pointer group">
<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-variant flex items-center justify-center text-xl shadow-inner">🇿🇦</div>
<span class="text-body-lg font-body-lg text-on-surface font-medium">South Africa</span>
</div>
<input class="mtn-radio" name="country" type="radio" value="ZA"/>
</label>
<!-- Country Item: Uganda -->
<label class="flex items-center justify-between p-4 border-b border-surface-variant hover:bg-surface-container-low transition-colors cursor-pointer group">
<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-variant flex items-center justify-center text-xl shadow-inner">🇺🇬</div>
<span class="text-body-lg font-body-lg text-on-surface font-medium">Uganda</span>
</div>
<input class="mtn-radio" name="country" type="radio" value="UG"/>
</label>
<!-- Country Item: Rwanda -->
<label class="flex items-center justify-between p-4 hover:bg-surface-container-low transition-colors cursor-pointer group">
<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-variant flex items-center justify-center text-xl shadow-inner">🇷🇼</div>
<span class="text-body-lg font-body-lg text-on-surface font-medium">Rwanda</span>
</div>
<input class="mtn-radio" name="country" type="radio" value="RW"/>
</label>
</div>
</section>
</main>
<!-- Fixed Bottom Action Bar -->
<div class="fixed bottom-0 w-full glass-panel border-t border-surface-variant px-container-margin-mobile py-4 z-50 flex justify-center">
<button class="w-full max-w-[600px] bg-primary-container text-on-primary-container text-title-md font-title-md py-4 rounded-xl shadow-lg hover:shadow-xl active:scale-[0.98] transition-all flex items-center justify-center gap-2">
            Confirm Selection
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">check_circle</span>
</button>
</div>
</body></html>
