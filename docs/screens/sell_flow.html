<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI-Assisted Listing Creation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        .ai-glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(118, 169, 255, 0.3);
        }
        .ai-gradient-text {
            background: linear-gradient(90deg, #1f5dae, #76a9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .ai-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "tertiary-fixed": "#95f1ff",
                      "surface-container-highest": "#e5e2e1",
                      "error-container": "#ffdad6",
                      "secondary": "#1f5dae",
                      "on-secondary-fixed-variant": "#00458d",
                      "secondary-container": "#76a9ff",
                      "tertiary-fixed-dim": "#00daf0",
                      "primary-fixed-dim": "#f1c100",
                      "outline-variant": "#d2c5ab",
                      "tertiary": "#006874",
                      "on-surface": "#1c1b1b",
                      "inverse-surface": "#313030",
                      "surface-container-lowest": "#ffffff",
                      "outline": "#80765f",
                      "on-error": "#ffffff",
                      "surface": "#fcf9f8",
                      "on-surface-variant": "#4e4632",
                      "inverse-primary": "#f1c100",
                      "surface-tint": "#745b00",
                      "on-tertiary-fixed": "#001f24",
                      "on-primary-fixed-variant": "#584400",
                      "on-tertiary-fixed-variant": "#004f57",
                      "on-primary": "#ffffff",
                      "on-secondary": "#ffffff",
                      "on-secondary-container": "#003c7c",
                      "surface-container-low": "#f6f3f2",
                      "on-error-container": "#93000a",
                      "secondary-fixed": "#d6e3ff",
                      "on-primary-container": "#6f5700",
                      "primary-container": "#ffcc00",
                      "inverse-on-surface": "#f3f0ef",
                      "surface-variant": "#e5e2e1",
                      "surface-bright": "#fcf9f8",
                      "on-tertiary-container": "#00646e",
                      "error": "#ba1a1a",
                      "secondary-fixed-dim": "#aac7ff",
                      "primary": "#745b00",
                      "surface-container": "#f0edec",
                      "tertiary-container": "#00e7fe",
                      "background": "#fcf9f8",
                      "surface-container-high": "#ebe7e7",
                      "on-tertiary": "#ffffff",
                      "on-secondary-fixed": "#001b3e",
                      "on-background": "#1c1b1b",
                      "on-primary-fixed": "#241a00",
                      "primary-fixed": "#ffe08b",
                      "surface-dim": "#dcd9d9"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "gutter": "16px",
                      "section-gap": "48px",
                      "container-margin-mobile": "16px",
                      "base": "8px",
                      "container-margin-desktop": "40px"
              },
              "fontFamily": {
                      "body-sm": [
                              "Inter"
                      ],
                      "headline-lg": [
                              "Inter"
                      ],
                      "display-lg": [
                              "Inter"
                      ],
                      "title-md": [
                              "Inter"
                      ],
                      "body-lg": [
                              "Inter"
                      ],
                      "label-caps": [
                              "Inter"
                      ],
                      "headline-lg-mobile": [
                              "Inter"
                      ]
              },
              "fontSize": {
                      "body-sm": [
                              "14px",
                              {
                                      "lineHeight": "20px",
                                      "fontWeight": "400"
                              }
                      ],
                      "headline-lg": [
                              "32px",
                              {
                                      "lineHeight": "40px",
                                      "letterSpacing": "-0.01em",
                                      "fontWeight": "700"
                              }
                      ],
                      "display-lg": [
                              "48px",
                              {
                                      "lineHeight": "56px",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "700"
                              }
                      ],
                      "title-md": [
                              "20px",
                              {
                                      "lineHeight": "28px",
                                      "fontWeight": "600"
                              }
                      ],
                      "body-lg": [
                              "16px",
                              {
                                      "lineHeight": "24px",
                                      "fontWeight": "400"
                              }
                      ],
                      "label-caps": [
                              "12px",
                              {
                                      "lineHeight": "16px",
                                      "letterSpacing": "0.05em",
                                      "fontWeight": "700"
                              }
                      ],
                      "headline-lg-mobile": [
                              "24px",
                              {
                                      "lineHeight": "32px",
                                      "fontWeight": "700"
                              }
                      ]
              }
      },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-sm antialiased min-h-screen pb-24 md:pb-0">
<!-- Top Navigation for Linear Flow -->
<header class="sticky top-0 w-full flex justify-between items-center px-container-margin-mobile py-base bg-surface z-50 shadow-sm md:px-container-margin-desktop h-[64px]">
<button aria-label="Close" class="text-primary p-2 hover:bg-surface-container-low rounded-full transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="text-title-md font-title-md font-bold text-primary text-center flex-1">Create Listing</h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-3xl mx-auto px-container-margin-mobile md:px-container-margin-desktop py-6">
<!-- Step Progress -->
<div class="flex items-center justify-between mb-8">
<div class="flex flex-col items-center flex-1">
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center text-label-caps font-label-caps font-bold z-10 relative">1</div>
<span class="text-label-caps font-label-caps text-primary mt-2">Details</span>
</div>
<div class="flex-1 h-1 bg-surface-container-high -ml-10 -mr-10 relative z-0 top-[-10px] rounded-full">
<div class="w-1/2 h-full bg-primary-container rounded-full"></div>
</div>
<div class="flex flex-col items-center flex-1">
<div class="w-8 h-8 rounded-full bg-surface-container-high text-on-surface-variant flex items-center justify-center text-label-caps font-label-caps font-bold z-10 relative">2</div>
<span class="text-label-caps font-label-caps text-on-surface-variant mt-2">Preview</span>
</div>
<div class="flex-1 h-1 bg-surface-container-high -ml-10 -mr-10 relative z-0 top-[-10px] rounded-full"></div>
<div class="flex flex-col items-center flex-1">
<div class="w-8 h-8 rounded-full bg-surface-container-high text-on-surface-variant flex items-center justify-center text-label-caps font-label-caps font-bold z-10 relative">3</div>
<span class="text-label-caps font-label-caps text-on-surface-variant mt-2">Publish</span>
</div>
</div>
<form class="space-y-section-gap">
<!-- Image Upload with AI -->
<section class="space-y-4">
<h2 class="text-title-md font-title-md text-on-surface">Photos</h2>
<div class="relative w-full h-48 border-2 border-dashed border-outline-variant rounded-xl flex flex-col items-center justify-center bg-surface-container-low hover:bg-surface-container-highest transition-colors overflow-hidden group cursor-pointer">
<!-- Placeholder state -->
<div class="flex flex-col items-center justify-center opacity-100 group-hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-4xl text-outline mb-2" data-icon="add_photo_alternate">add_photo_alternate</span>
<p class="text-body-sm font-body-sm text-on-surface-variant">Tap to upload photos</p>
</div>
<!-- Simulated AI Processing State (hidden by default, shown for demo) -->
<div class="absolute inset-0 bg-surface/90 flex flex-col items-center justify-center hidden">
<div class="ai-glass px-4 py-2 rounded-full flex items-center gap-2 ai-pulse border-secondary-container">
<span class="material-symbols-outlined text-secondary" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="text-body-sm font-body-sm font-semibold ai-gradient-text">AI Enhancing Images...</span>
</div>
</div>
</div>
</section>
<!-- Title with AI Optimize -->
<section class="space-y-2 relative">
<label class="text-body-sm font-body-sm font-semibold text-on-surface" for="listing-title">Title</label>
<div class="relative">
<input class="w-full bg-[#F5F5F5] border border-transparent focus:border-secondary focus:ring-1 focus:ring-secondary rounded-lg px-4 py-3 text-body-lg font-body-lg text-on-surface transition-colors pr-12" id="listing-title" placeholder="What are you selling?" type="text"/>
<button class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full flex items-center justify-center hover:bg-surface-container-high transition-colors group" title="AI Optimize Title" type="button">
<span class="material-symbols-outlined text-secondary group-hover:scale-110 transition-transform" data-icon="magic_button">magic_button</span>
</button>
</div>
<!-- AI Category Badge Suggestion -->
<div class="mt-2 flex items-center gap-2">
<div class="ai-glass inline-flex items-center gap-1.5 px-3 py-1 rounded-full">
<span class="material-symbols-outlined text-[16px] text-secondary" data-icon="auto_awesome">auto_awesome</span>
<span class="text-label-caps font-label-caps text-on-surface">Suggested: Electronics</span>
</div>
</div>
</section>
<!-- Description with AI Wand -->
<section class="space-y-2">
<div class="flex justify-between items-center">
<label class="text-body-sm font-body-sm font-semibold text-on-surface" for="listing-description">Description</label>
<button class="text-label-caps font-label-caps text-secondary font-semibold flex items-center gap-1 hover:text-on-secondary-fixed-variant transition-colors" type="button">
<span class="material-symbols-outlined text-[16px]" data-icon="edit_note">edit_note</span>
                        AI Write Description
                    </button>
</div>
<textarea class="w-full bg-[#F5F5F5] border border-transparent focus:border-secondary focus:ring-1 focus:ring-secondary rounded-lg px-4 py-3 text-body-lg font-body-lg text-on-surface transition-colors resize-none" id="listing-description" placeholder="Describe your item in detail..." rows="4"></textarea>
</section>
<!-- Price with AI Suggestion -->
<section class="space-y-2 pb-8">
<label class="text-body-sm font-body-sm font-semibold text-on-surface" for="listing-price">Price</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-body-lg font-body-lg text-on-surface-variant font-semibold">R</span>
<input class="w-full bg-[#F5F5F5] border border-transparent focus:border-secondary focus:ring-1 focus:ring-secondary rounded-lg pl-8 pr-4 py-3 text-body-lg font-body-lg text-on-surface transition-colors" id="listing-price" placeholder="0.00" type="number"/>
</div>
<!-- AI Price Insight -->
<div class="mt-3 ai-glass rounded-xl p-3 flex items-start gap-3 border-l-4 border-l-secondary">
<span class="material-symbols-outlined text-secondary mt-0.5" data-icon="trending_up">trending_up</span>
<div>
<p class="text-body-sm font-body-sm font-semibold text-on-surface">AI Suggested Price: R 450 - R 550</p>
<p class="text-label-caps font-label-caps text-on-surface-variant mt-1">Based on recent sales of similar items in your area.</p>
<button class="mt-2 text-label-caps font-label-caps text-secondary font-bold hover:underline" type="button">Apply Suggested Price</button>
</div>
</div>
</section>
<!-- Sticky Action Button -->
<div class="fixed bottom-0 left-0 w-full p-4 bg-surface/90 backdrop-blur-md border-t border-outline-variant z-40 md:relative md:bg-transparent md:border-none md:p-0 md:pt-4">
<button class="w-full bg-primary-container text-on-primary-container font-title-md text-title-md font-bold py-3 px-6 rounded-lg hover:bg-[#e6b800] transition-colors shadow-sm" type="button">
                    Next Step
                </button>
</div>
</form>
</main>
</body></html>
