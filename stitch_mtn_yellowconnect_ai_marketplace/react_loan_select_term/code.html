<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>React: Loan Select Term</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                    "secondary-fixed": "#d6e3ff",
                    "inverse-surface": "#313030",
                    "on-background": "#1c1b1b",
                    "error": "#ba1a1a",
                    "secondary-fixed-dim": "#aac7ff",
                    "on-tertiary": "#ffffff",
                    "primary-container": "#ffcc00",
                    "on-tertiary-fixed-variant": "#004f57",
                    "on-surface-variant": "#4e4632",
                    "primary-fixed": "#ffe08b",
                    "outline-variant": "#d2c5ab",
                    "on-secondary-container": "#003c7c",
                    "outline": "#80765f",
                    "surface": "#fcf9f8",
                    "on-primary-fixed": "#241a00",
                    "on-error-container": "#93000a",
                    "surface-container-low": "#f6f3f2",
                    "on-primary-container": "#6f5700",
                    "surface-container": "#f0edec",
                    "surface-bright": "#fcf9f8",
                    "inverse-primary": "#f1c100",
                    "inverse-on-surface": "#f3f0ef",
                    "on-primary-fixed-variant": "#584400",
                    "on-secondary-fixed-variant": "#00458d",
                    "error-container": "#ffdad6",
                    "surface-dim": "#dcd9d9",
                    "surface-container-highest": "#e5e2e1",
                    "on-surface": "#1c1b1b",
                    "on-error": "#ffffff",
                    "primary-fixed-dim": "#f1c100",
                    "on-primary": "#ffffff",
                    "background": "#fcf9f8",
                    "tertiary": "#006874",
                    "surface-variant": "#e5e2e1",
                    "on-tertiary-fixed": "#001f24",
                    "primary": "#745b00",
                    "surface-container-high": "#ebe7e7",
                    "on-secondary-fixed": "#001b3e",
                    "tertiary-fixed-dim": "#00daf0",
                    "surface-container-lowest": "#ffffff",
                    "secondary-container": "#76a9ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "section-gap": "48px",
                    "container-margin-mobile": "16px",
                    "container-margin-desktop": "40px",
                    "base": "8px",
                    "gutter": "16px"
            },
            "fontFamily": {
                    "body-sm": ["Inter"],
                    "display-lg": ["Inter"],
                    "title-md": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "headline-lg": ["Inter"],
                    "label-caps": ["Inter"],
                    "body-lg": ["Inter"]
            },
            "fontSize": {
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "title-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],

<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface h-screen flex flex-col antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 w-full shadow-sm bg-surface dark:bg-surface-dim flex items-center justify-between px-container-margin-mobile h-16 w-full z-50 border-b border-outline-variant md:hidden">
<div class="flex items-center gap-4">
<button class="text-primary hover:bg-surface-container-high transition-colors active:scale-95 transition-transform p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back" data-weight="regular">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary dark:text-primary-fixed-dim">MerchantHub</h1>
</div>
<div class="flex items-center gap-2">
<button class="text-primary hover:bg-surface-container-high transition-colors active:scale-95 transition-transform p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="help_outline" data-weight="regular">help_outline</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 mt-16 px-container-margin-mobile py-8 overflow-y-auto">
<div class="mb-section-gap">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">Select Repayment Term</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Choose a schedule that fits your cash flow.</p>
</div>
<div class="space-y-gutter">
<!-- Option 1: 3 Months -->
<label class="block relative p-4 rounded-xl border border-outline-variant bg-surface-container-lowest shadow-sm hover:shadow-md transition-shadow cursor-pointer flex items-center gap-4">
<input class="w-5 h-5 text-secondary border-outline-variant focus:ring-secondary" name="term" type="radio" value="3"/>
<div class="flex-1">
<div class="flex justify-between items-center mb-1">
<span class="font-title-md text-title-md text-on-surface">3 Months</span>
<span class="font-title-md text-title-md text-secondary">$850<span class="font-body-sm text-body-sm text-on-surface-variant">/mo</span></span>
</div>
<div class="flex justify-between items-center">
<span class="font-body-sm text-body-sm text-on-surface-variant">Total: $2,550</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">APR: 18%</span>
</div>
</div>
</label>
<!-- Option 2: 6 Months (Recommended) -->
<label class="block relative p-4 rounded-xl border-2 border-secondary bg-secondary-fixed-dim bg-opacity-10 shadow-sm hover:shadow-md transition-shadow cursor-pointer flex items-center gap-4">
<!-- AI Enhanced Badge / Recommendation -->
<div class="absolute -top-3 right-4 bg-tertiary text-on-tertiary font-label-caps text-label-caps px-3 py-1 rounded-full shadow-sm flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]" data-icon="auto_awesome" data-weight="fill">auto_awesome</span>
                    RECOMMENDED
                </div>
<input checked="" class="w-5 h-5 text-secondary border-outline-variant focus:ring-secondary" name="term" type="radio" value="6"/>
<div class="flex-1">
<div class="flex justify-between items-center mb-1">
<span class="font-title-md text-title-md text-on-surface">6 Months</span>
<span class="font-title-md text-title-md text-secondary">$450<span class="font-body-sm text-body-sm text-on-surface-variant">/mo</span></span>
</div>
<div class="flex justify-between items-center">
<span class="font-body-sm text-body-sm text-on-surface-variant">Total: $2,700</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">APR: 21%</span>
</div>
</div>
</label>
<!-- Option 3: 12 Months -->
<label class="block relative p-4 rounded-xl border border-outline-variant bg-surface-container-lowest shadow-sm hover:shadow-md transition-shadow cursor-pointer flex items-center gap-4">
<input class="w-5 h-5 text-secondary border-outline-variant focus:ring-secondary" name="term" type="radio" value="12"/>
<div class="flex-1">
<div class="flex justify-between items-center mb-1">
<span class="font-title-md text-title-md text-on-surface">12 Months</span>
<span class="font-title-md text-title-md text-secondary">$250<span class="font-body-sm text-body-sm text-on-surface-variant">/mo</span></span>
</div>
<div class="flex justify-between items-center">
<span class="font-body-sm text-body-sm text-on-surface-variant">Total: $3,000</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">APR: 24%</span>
</div>
</div>
</label>
</div>
<div class="mt-section-gap">
<div class="bg-surface-container p-4 rounded-xl flex items-start gap-3">
<span class="material-symbols-outlined text-tertiary mt-0.5" data-icon="info" data-weight="regular">info</span>
<p class="font-body-sm text-body-sm text-on-surface-variant">Your business performance data suggests the 6-month term provides the best balance of manageable payments and lowest overall cost based on your projected revenue.</p>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<div class="p-container-margin-mobile bg-surface-container-lowest border-t border-outline-variant shadow-lg pb-8">
<button class="w-full bg-primary text-on-primary-fixed font-title-md text-title-md py-3 rounded-xl hover:bg-inverse-primary transition-colors active:scale-95">
            Continue with Selected Term
        </button>
</div>
</body></html>
