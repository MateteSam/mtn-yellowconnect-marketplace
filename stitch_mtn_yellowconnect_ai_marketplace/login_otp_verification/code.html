<script>
        // OTP Input Logic
        const container = document.getElementById('otp-container');
        const inputs = container.querySelectorAll('input');

        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 1) {
                    e.target.value = e.target.value.slice(0, 1); // Keep only first char
                }
                if (e.target.value !== '') {
                    if (index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '') {
                    if (index > 0) {
                        inputs[index - 1].focus();
                        inputs[index - 1].value = '';
                    }
                }
            });

            // Handle Paste
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text').slice(0, inputs.length).replace(/\D/g, '');
                if (pastedData) {
                    [...pastedData].forEach((char, i) => {
                        if (inputs[index + i]) {
                            inputs[index + i].value = char;
                            if (index + i < inputs.length - 1) {
                                inputs[index + i + 1].focus();
                            }
                        }
                    });
                }
            });
        });

        // Timer Logic
        let timeLeft = 59;
        const timerElement = document.getElementById('timer');
        const resendBtn = document.getElementById('resend-btn');

        const countdown = setInterval(() => {
            timeLeft--;
            const seconds = timeLeft < 10 ? `0${timeLeft}` : timeLeft;
            timerElement.textContent = `00:${seconds}`;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerElement.textContent = '';
                resendBtn.innerHTML = 'Resend Code';
                resendBtn.disabled = false;
            }
        }, 1000);
    </script>
