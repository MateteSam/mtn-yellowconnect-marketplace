</button>

<div class="w-10"></div> <!-- Spacer for centering -->
</div>

<!-- Tax Year List -->
<div class="flex flex-col gap-4">
<!-- Selected Year (2023) -->
<label class="relative block cursor-pointer group">
<input checked="" class="peer sr-only" name="tax_year" type="radio" value="2023"/>
<div class="rounded-xl border-2 border-primary bg-primary-container/10 p-4 transition-all hover:bg-surface-container-low peer-checked:bg-primary-container/20">
<div class="flex items-center justify-between mb-2">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary icon-fill text-2xl">calendar_month</span>
<h2 class="font-title-md text-title-md text-on-surface">2023</h2>
</div>
<span class="material-symbols-outlined text-primary icon-fill">check_circle</span>
</div>
<div class="grid grid-cols-2 gap-4 mt-4 bg-surface rounded-lg p-3 shadow-sm border border-outline-variant/30">
<div>
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase">Total Earnings</p>
<p class="font-body-lg text-body-lg text-on-surface font-semibold mt-1">₦12,450,000</p>
</div>
<div>
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase">Status</p>
<div class="flex items-center gap-1 mt-1 text-tertiary">
<span class="material-symbols-outlined text-sm">download_done</span>
<p class="font-body-sm text-body-sm font-medium">Ready for Export</p>
</div>
</div>
</div>
</div>
</label>
<!-- Unselected Year (2022) -->
<label class="relative block cursor-pointer group">

<div class="rounded-xl border border-outline-variant bg-surface p-4 transition-all hover:bg-surface-container-low peer-checked:border-2 peer-checked:border-primary peer-checked:bg-primary-container/10">
<div class="flex items-center justify-between mb-2">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant text-2xl">calendar_month</span>
<h2 class="font-title-md text-title-md text-on-surface">2022</h2>
</div>
<span class="material-symbols-outlined text-outline-variant peer-checked:text-primary peer-checked:icon-fill hidden group-hover:block opacity-50">radio_button_unchecked</span>
</div>
<div class="grid grid-cols-2 gap-4 mt-4 bg-surface-container-lowest rounded-lg p-3 border border-outline-variant/30">
<div>
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase">Total Earnings</p>
<p class="font-body-lg text-body-lg text-on-surface font-semibold mt-1">₦9,820,500</p>
</div>
<div>
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase">Status</p>
<div class="flex items-center gap-1 mt-1 text-on-surface-variant">
<span class="material-symbols-outlined text-sm">inventory_2</span>
<p class="font-body-sm text-body-sm font-medium">Archived</p>
</div>
</div>
</div>
</div>
</label>
