<!-- Main Content Canvas -->

<!-- Progress Stepper -->
<div class="mb-8">
<div class="flex items-center justify-between mb-2">

<h2 class="text-headline-lg-mobile font-headline-lg-mobile text-on-surface mb-2 md:text-headline-lg md:font-headline-lg">Select ID Type</h2>
<p class="text-body-lg font-body-lg text-on-surface-variant">Choose the type of official document you wish to use to verify your identity. Ensure it is valid and clearly legible.</p>
</div>
<!-- Document Selection Options -->
<form class="space-y-4">

<span class="material-symbols-outlined text-2xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">badge</span>
</div>
<div class="flex-1">
<div class="text-title-md font-title-md text-on-surface">National ID</div>
<div class="text-body-sm font-body-sm text-on-surface-variant">Standard government-issued identification card.</div>
</div>
<div class="ml-4 flex items-center">
<input checked="" class="w-6 h-6 text-primary border-outline-variant focus:ring-primary focus:ring-2 bg-surface checked:bg-primary" name="document_type" type="radio" value="national_id"/>
</div>
</label>
<!-- Option 2: Passport -->
<label class="relative flex items-center p-4 rounded-xl border border-outline-variant bg-surface-container-lowest shadow-sm hover:shadow-md hover:border-primary cursor-pointer transition-all duration-200 group focus-within:ring-2 focus-within:ring-primary focus-within:ring-offset-2 focus-within:ring-offset-surface">
<div class="flex items-center justify-center w-12 h-12 rounded-lg bg-surface-container-low text-primary mr-4 group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">
<span class="material-symbols-outlined text-2xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">book</span>
</div>
<div class="flex-1">
<div class="text-title-md font-title-md text-on-surface">Passport</div>
<div class="text-body-sm font-body-sm text-on-surface-variant">International travel document booklet.</div>
</div>

<input class="w-6 h-6 text-primary border-outline-variant focus:ring-primary focus:ring-2 bg-surface checked:bg-primary" name="document_type" type="radio" value="passport"/>
</div>

<!-- Navigation Shells SUPPRESSED as this is a transactional flow (Identity Verification) -->
<script>
        // Simple JS to handle active state styling on radio selection
        document.addEventListener('DOMContentLoaded', () => {
            const labels = document.querySelectorAll('label');
            const radios = document.querySelectorAll('input[type="radio"]');

            function updateStyles() {
                labels.forEach(label => {
                    const radio = label.querySelector('input[type="radio"]');
                    if (radio.checked) {
                        label.classList.add('border-primary', 'ring-1', 'ring-primary', 'bg-surface-container-low');
                        label.classList.remove('border-outline-variant', 'bg-surface-container-lowest');
                    } else {
                        label.classList.remove('border-primary', 'ring-1', 'ring-primary', 'bg-surface-container-low');
                        label.classList.add('border-outline-variant', 'bg-surface-container-lowest');
                    }
                });
            }

            radios.forEach(radio => {
                radio.addEventListener('change', updateStyles);
            });

            // Initial setup
            updateStyles();
        });
    </script>
