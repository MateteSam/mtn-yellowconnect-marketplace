            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;

  TopAppBar, BottomNavBar, and NavigationDrawer are intentionally excluded to focus the user on the outcome canvas.
-->

<!-- Subtle background glow for 'High-Trust Innovation' feel -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80vw] h-[80vw] max-w-[600px] max-h-[600px] bg-primary-container/10 rounded-full blur-[100px] pointer-events-none -z-10"></div>
<main class="w-full max-w-md flex flex-col items-center text-center z-10">
<!-- Header Section -->
<div class="flex flex-col items-center space-y-6 mb-section-gap opacity-0 animate-entrance">

<div class="relative flex items-center justify-center">
<!-- Outer Pulse ring -->
<div class="absolute w-32 h-32 bg-primary-container/20 rounded-full animate-pulse"></div>
<!-- Inner Solid Icon -->
<div class="relative w-20 h-20 bg-primary-container rounded-full flex items-center justify-center shadow-lg transform transition-transform hover:scale-105 duration-300">
<span class="material-symbols-outlined text-on-surface text-5xl" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
</div>
<div class="space-y-2 px-4">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface tracking-tight">
                    Tax Dispute Approved
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-sm mx-auto">
                    The compliance team has ruled in your favor. The previously withheld funds have been returned to your operational wallet.
                </p>
</div>
</div>
<!-- Details Card -->
<div class="w-full bg-surface-container-low rounded-xl p-6 border border-outline-variant/30 text-left shadow-[0_4px_12px_rgba(0,0,0,0.02)] mb-8 opacity-0 animate-entrance delay-100 relative overflow-hidden">

<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-surface-container-highest to-transparent"></div>
<div class="space-y-4">
<div class="flex justify-between items-center border-b border-outline-variant/20 pb-3">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Case Reference</span>
<span class="font-body-sm text-body-sm text-on-surface font-semibold tracking-wide">#TX-2024-8942A</span>
</div>
<div class="flex justify-between items-center py-1">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Original Deduction</span>
<span class="font-title-md text-title-md text-on-surface-variant">-$450.00</span>
</div>
<div class="flex justify-between items-center py-3 bg-secondary-container/10 -mx-6 px-6 border-y border-outline-variant/10">
<div class="flex items-center space-x-2">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>

</div>
<span class="font-title-md text-title-md text-secondary font-bold">+$450.00</span>
</div>
</div>
</div>

<div class="w-full flex flex-col space-y-4 opacity-0 animate-entrance delay-200">

<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
