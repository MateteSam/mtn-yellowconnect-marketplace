<html lang="en"><head>

                    },

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1;

    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="bg-surface text-on-surface font-body-sm antialiased min-h-screen flex flex-col items-center justify-center p-container-margin-mobile">
<!-- Transactional Screen - No Nav Shells -->
<div class="w-full max-w-md w-full bg-surface-container-lowest rounded-xl shadow-[0px_4px_12px_rgba(0,0,0,0.05)] p-6 border border-surface-variant flex flex-col gap-6 relative overflow-hidden">
<!-- Decorative Header Element -->
<div class="absolute top-0 left-0 w-full h-2 bg-primary-container"></div>
<!-- Header -->
<div class="flex flex-col items-center text-center gap-2 mt-4">
<div class="w-16 h-16 bg-primary-container/10 rounded-full flex items-center justify-center mb-2 text-primary">
<span class="material-symbols-outlined !text-3xl" data-icon="lock_reset" data-weight="fill">lock_reset</span>
</div>
<h1 class="text-headline-lg-mobile font-headline-lg-mobile text-on-surface">Create New Password</h1>
<p class="text-body-sm font-body-sm text-on-surface-variant">Your new password must be different from previous ones.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-4 mt-2">
<!-- New Password Field -->
<div class="flex flex-col gap-1">
<label class="text-label-caps font-label-caps text-on-surface-variant uppercase" for="new-password">New Password</label>
<div class="relative w-full">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</span>
<input class="w-full bg-[#F5F5F5] border-transparent focus:border-secondary focus:ring-1 focus:ring-secondary rounded-lg py-3 pl-10 pr-10 text-body-lg font-body-lg text-on-surface placeholder-on-surface-variant/50 transition-colors" id="new-password" placeholder="Enter new password" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-3 text-on-surface-variant hover:text-on-surface transition-colors toggle-password" data-target="new-password" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
<div class="text-[11px] text-on-surface-variant mt-1 flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]" data-icon="info">info</span> Must be at least 8 characters.
                </div>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col gap-1">
<label class="text-label-caps font-label-caps text-on-surface-variant uppercase" for="confirm-password">Confirm New Password</label>
<div class="relative w-full">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</span>
<input class="w-full bg-[#F5F5F5] border-transparent focus:border-secondary focus:ring-1 focus:ring-secondary rounded-lg py-3 pl-10 pr-10 text-body-lg font-body-lg text-on-surface placeholder-on-surface-variant/50 transition-colors" id="confirm-password" placeholder="Re-enter new password" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-3 text-on-surface-variant hover:text-on-surface transition-colors toggle-password" data-target="confirm-password" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="mt-4 w-full bg-primary-container text-on-primary-fixed text-title-md font-title-md font-bold py-3 px-6 rounded-full hover:bg-primary-fixed transition-colors active:scale-95 duration-100 flex items-center justify-center gap-2" type="submit">
                Update Password
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Cancel Link -->
<div class="text-center mt-2">
<a class="text-body-sm font-body-sm text-secondary hover:underline" href="#">Cancel &amp; Return to Login</a>
</div>
</form>
</div>
<script>
        // Password Visibility Toggle Logic
        document.querySelectorAll('.toggle-password').forEach(button => {
            button.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const inputField = document.getElementById(targetId);
                const iconSpan = this.querySelector('.material-symbols-outlined');
                
                if (inputField.type === 'password') {
                    inputField.type = 'text';
                    iconSpan.textContent = 'visibility_off';
                    iconSpan.setAttribute('data-icon', 'visibility_off');
                } else {
                    inputField.type = 'password';
                    iconSpan.textContent = 'visibility';
                    iconSpan.setAttribute('data-icon', 'visibility');
                }
            });
        });
    </script>
</body></html>
