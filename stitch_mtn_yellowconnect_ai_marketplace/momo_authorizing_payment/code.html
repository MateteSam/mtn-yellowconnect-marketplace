<!-- 
      Structural Note: 
      TopAppBar and BottomNavBar are deliberately suppressed here based on the 
      "Automatic Suppression" rule for Linear/Transactional screens. 
      This ensures the user remains focused on the critical payment authorization step.
    -->
<main class="w-full max-w-[420px] bg-surface-container-lowest rounded-xl shadow-[0_8px_32px_rgba(0,0,0,0.08)] border border-surface-variant overflow-hidden flex flex-col relative">
<!-- Decorative Header Bar -->

<div class="p-8 flex flex-col items-center text-center">
<!-- MoMo Brand Element -->
<div class="w-20 h-20 bg-primary-container rounded-full flex items-center justify-center mb-6 shadow-sm pulse-ring relative">
<!-- Inner circle to create a target/focus effect -->
<div class="absolute inset-2 bg-surface-container-lowest rounded-full flex items-center justify-center">
<span class="font-headline-lg-mobile text-headline-lg-mobile text-on-primary-container font-extrabold tracking-tighter">MoMo</span>
</div>
</div>
<!-- Context Text -->
<h1 class="font-title-md text-title-md text-on-surface mb-2">Authorizing Payment</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mb-6">to Marketplace Merchant</p>
<!-- Amount -->
<div class="mb-8">
<span class="font-display-lg text-display-lg text-on-surface tracking-tight">$1,299.00</span>
</div>
<!-- Loading & Instructions -->
<div class="bg-surface-container-low rounded-xl p-6 w-full mb-8 relative overflow-hidden border border-surface-variant/50">
<!-- Subtle background shimmer -->
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/40 to-transparent -translate-x-full animate-[shimmer_2s_infinite]"></div>
<div class="flex flex-col items-center relative z-10">
<!-- Custom Spinner -->

<p class="font-body-lg text-body-lg text-on-surface max-w-[250px]">
                        Please check your phone and authorize this transaction via MoMo.
                    </p>
</div>
</div>
<!-- Countdown Timer -->
<div class="flex items-center justify-center gap-2 mb-8 bg-surface-container py-2 px-4 rounded-full">
<span class="material-symbols-outlined text-primary text-[20px]" data-icon="timer">timer</span>
<span class="font-label-caps text-label-caps text-on-surface uppercase tracking-wider" id="countdown-timer">Session expires in 04:59</span>
</div>
<!-- Actions -->
<div class="w-full">
<button class="w-full py-3 px-4 rounded-full font-label-caps text-label-caps text-on-surface-variant bg-surface-container hover:bg-surface-container-high transition-colors duration-200 border border-outline-variant flex items-center justify-center gap-2 uppercase tracking-wide">
<span class="material-symbols-outlined text-[18px]" data-icon="close">close</span>
                    Cancel Transaction
                </button>
</div>
</div>
</main>
<script>
        // Simple countdown timer logic
        document.addEventListener('DOMContentLoaded', () => {
            let timeLeft = 299; // 4:59 in seconds
            const timerElement = document.getElementById('countdown-timer');
            
            const updateTimer = () => {
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                
                const formattedTime = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                timerElement.textContent = `Session expires in ${formattedTime}`;
                
                if (timeLeft > 0) {
                    timeLeft--;
                } else {
                    clearInterval(timerInterval);
                    timerElement.textContent = "Session expired";
                    timerElement.classList.add("text-error");
                }
            };
            
            const timerInterval = setInterval(updateTimer, 1000);
        });
    </script>
