<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MTN Marketplace - Gold Membership</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#95f1ff",

                        "on-primary": "#ffffff",

                        "inverse-surface": "#313030",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#004f57",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#4e4632",
                        "secondary-container": "#76a9ff",
                        "on-primary-fixed-variant": "#584400",
                        "surface-bright": "#fcf9f8",
                        "error": "#ba1a1a",
                        "primary-fixed-dim": "#f1c100",
                        "on-tertiary-container": "#00646e",
                        "secondary-fixed-dim": "#aac7ff",
                        "background": "#fcf9f8",
                        "outline": "#80765f",
                        "tertiary": "#006874",
                        "on-tertiary": "#ffffff",
                        "primary-fixed": "#ffe08b",
                        "surface-variant": "#e5e2e1",
                        "surface-container-low": "#f6f3f2",
                        "on-secondary": "#ffffff",
                        "surface-container": "#f0edec",
                        "on-secondary-container": "#003c7c",
                        "on-error-container": "#93000a",
                        "surface-container-highest": "#e5e2e1",
                        "secondary": "#1f5dae",
                        "on-secondary-fixed": "#001b3e",
                        "on-tertiary-fixed": "#001f24",
                        "primary": "#745b00",
                        "tertiary-fixed-dim": "#00daf0",
                        "on-error": "#ffffff",
                        "tertiary-container": "#00e7fe",
                        "on-surface": "#1c1b1b",
                        "surface-dim": "#dcd9d9",
                        "surface": "#fcf9f8",
                        "primary-container": "#ffcc00",
                        "on-primary-container": "#6f5700",
                        "on-background": "#1c1b1b",
                        "secondary-fixed": "#d6e3ff",
                        "surface-container-high": "#ebe7e7",
                        "inverse-on-surface": "#f3f0ef",
                        "outline-variant": "#d2c5ab",
                        "on-secondary-fixed-variant": "#00458d",
                        "inverse-primary": "#f1c100",
                        "gold": {
                            "100": "#fcf6d1",
                            "200": "#f8eaa2",
                            "300": "#f4da73",
                            "400": "#f0c844",
                            "500": "#d4af37",
                            "600": "#aa8c2c",
                            "700": "#806921",
                            "800": "#554616",
                            "900": "#2a230b"
                        }
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-gap": "48px",
                        "gutter": "16px",
                        "container-margin-mobile": "16px",
                        "base": "8px",
                        "container-margin-desktop": "40px"
                    },
                    "fontFamily": {

                        "title-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }]

                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom Gold Gradient for the card */
        .bg-gradient-gold {
            background: linear-gradient(135deg, #d4af37 0%, #aa8c2c 100%);
        }
        .text-gradient-gold {
            background: linear-gradient(135deg, #d4af37 0%, #aa8c2c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .shimmer {
            position: relative;
            overflow: hidden;
        }
        .shimmer::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-20deg);
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            100% { left: 200%; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-lg">
<div id="root"></div>
<script type="text/javascript">
const BenefitCard = ({ icon, title, description, colorClass, iconColorClass, fullWidth }) => (
  <div className={`bg-surface rounded-xl p-4 shadow-sm border border-outline-variant flex flex-col items-start gap-2 ${fullWidth ? 'col-span-2' : ''}`}>
    <div className={`${colorClass} p-2 rounded-lg relative`}>
      <span className={`material-symbols-outlined ${iconColorClass} icon-filled`}>{icon}</span>
      {title === 'AI Analytics' && <span className="absolute -top-1 -right-1 material-symbols-outlined text-xs text-primary">auto_awesome</span>}
    </div>
    <div>
      <h3 className={`font-title-md text-title-md text-on-surface ${fullWidth ? 'text-base' : 'text-sm leading-tight'}`}>{title}</h3>
      <p className={`font-body-sm text-body-sm text-on-surface-variant ${fullWidth ? '' : 'text-xs'}`}>{description}</p>
    </div>
  </div>
);

const PricingSection = () => {
  const [plan, setPlan] = React.useState('monthly');
  
  return (
    <section className="flex flex-col gap-gutter bg-surface-container-lowest p-6 rounded-xl border border-outline-variant shadow-sm relative">
      <div className="flex justify-center mb-2">
        <div className="bg-surface-variant rounded-full p-1 flex relative">
          <button 
            className={`px-4 py-1.5 rounded-full font-label-caps text-label-caps z-10 transition-colors ${plan === 'monthly' ? 'text-on-surface' : 'text-on-surface-variant'}`}
            onClick={() => setPlan('monthly')}
          >
            Monthly
          </button>
          <button 
            className={`px-4 py-1.5 rounded-full font-label-caps text-label-caps z-10 transition-colors flex items-center gap-1 ${plan === 'annual' ? 'text-on-surface' : 'text-on-surface-variant'}`}
            onClick={() => setPlan('annual')}
          >
            Annually
            <span className="bg-primary-container text-on-primary-container text-[8px] px-1.5 py-0.5 rounded-full ml-1">Save 20%</span>
          </button>
          <div 
            className="absolute top-1 left-1 bottom-1 w-[calc(50%-4px)] bg-surface rounded-full shadow-sm transition-transform duration-300 ease-in-out"
            style={{ transform: plan === 'monthly' ? 'translateX(0)' : 'translateX(100%)' }}
          ></div>
        </div>
      </div>
      <div className="text-center">
        <div className="flex items-end justify-center gap-1 mb-1">
          <span className="font-body-sm text-body-sm text-on-surface-variant mb-1">R</span>
          <span className="font-display-lg text-display-lg text-on-surface">{plan === 'monthly' ? '199' : '159'}</span>
          <span className="font-body-sm text-body-sm text-on-surface-variant mb-1">/mo</span>
        </div>
        <p className="font-body-sm text-body-sm text-on-surface-variant text-xs">
          {plan === 'monthly' ? 'Billed monthly. Cancel anytime.' : 'Billed R1908 annually. Cancel anytime.'}
        </p>
      </div>
      <button className="w-full bg-primary text-on-primary font-title-md text-title-md py-3 rounded-lg mt-4 shadow-md hover:bg-on-primary-fixed-variant transition-colors active:scale-95 flex justify-center items-center gap-2">
        Upgrade to Gold
        <span className="material-symbols-outlined text-sm">arrow_forward</span>
      </button>
      <p className="text-center font-body-sm text-body-sm text-on-surface-variant text-xs mt-2">By upgrading, you agree to the Gold Terms of Service.</p>
    </section>
  );
};

const MTNGoldMembership = () => {
  const benefits = [
    { icon: 'percent', title: 'Lower Transaction Fees', description: 'Keep more of what you earn with reduced rates.', colorClass: 'bg-gold-100', iconColorClass: 'text-gold-600', fullWidth: true },
    { icon: 'support_agent', title: 'Priority Support', description: 'Skip the queue 24/7.', colorClass: 'bg-secondary-container/30', iconColorClass: 'text-secondary' },
    { icon: 'verified', title: 'Gold Badge', description: 'Stand out in search.', colorClass: 'bg-primary-container/30', iconColorClass: 'text-primary' },
    { icon: 'bar_chart', title: 'AI Analytics', description: 'Smarter pricing insights.', colorClass: 'bg-tertiary-container/30', iconColorClass: 'text-tertiary' },
    { icon: 'rocket_launch', title: '5 Free Boosts', description: 'Push listings to top.', colorClass: 'bg-error-container/30', iconColorClass: 'text-error' }
  ];

  return (
    <div className="bg-background text-on-background min-h-screen flex flex-col font-body-lg">
      <header className="sticky top-0 w-full flex justify-between items-center px-container-margin-mobile py-base shadow-sm bg-surface z-50">
        <div className="flex items-center gap-2 text-on-surface-variant font-medium cursor-pointer" onClick={() => history.back()}>
          <span className="material-symbols-outlined">arrow_back</span>
        </div>
        <div className="text-title-md font-title-md font-bold text-primary">MTN Marketplace</div>
        <div className="w-6"></div>
      </header>
      <main className="flex-1 px-container-margin-mobile pb-section-gap pt-gutter flex flex-col gap-section-gap">
        <section className="relative rounded-xl overflow-hidden bg-gradient-gold text-on-primary shadow-lg p-6 flex flex-col items-center text-center shimmer">
          <div className="absolute top-0 right-0 -mt-10 -mr-10 w-32 h-32 bg-white opacity-10 rounded-full blur-2xl"></div>
          <div className="absolute bottom-0 left-0 -mb-10 -ml-10 w-24 h-24 bg-white opacity-10 rounded-full blur-xl"></div>
          <div className="z-10 mb-4 bg-white/20 p-3 rounded-full backdrop-blur-sm border border-white/30">
            <span className="material-symbols-outlined text-4xl text-white icon-filled">workspace_premium</span>
          </div>
          <h1 className="font-headline-lg-mobile text-headline-lg-mobile mb-2 z-10 text-white">MTN Gold</h1>
          <p className="font-body-sm text-body-sm text-white/90 z-10 max-w-[250px]">Elevate your selling experience with exclusive tools and priority visibility.</p>
        </section>
        <section className="flex flex-col gap-gutter">
          <h2 className="font-title-md text-title-md text-on-surface">Exclusive Benefits</h2>
          <div className="grid grid-cols-2 gap-3">
            {benefits.map((benefit, index) => <BenefitCard key={index} {...benefit} />)}
          </div>
        </section>
        <PricingSection />
      </main>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<MTNGoldMembership />);
</script>
</body></html>
