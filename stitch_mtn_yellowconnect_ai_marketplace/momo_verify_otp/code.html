<script>
        // OTP Input Logic
        const inputs = document.querySelectorAll('#otp-container input');

        inputs.forEach((input, index) => {
            // Focus next input on type
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 1) {
                    e.target.value = e.target.value.slice(0, 1);
                }
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            // Handle backspace
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            // Handle paste
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text').slice(0, inputs.length).replace(/[^0-9]/g, '');
                
                for (let i = 0; i < pastedData.length; i++) {
                    if (index + i < inputs.length) {
                        inputs[index + i].value = pastedData[i];
                        if (index + i < inputs.length - 1) {
                            inputs[index + i + 1].focus();
                        } else {
                            inputs[index + i].blur(); // Blur if last input is filled via paste
                        }
                    }
                }
            });
        });
    </script>
