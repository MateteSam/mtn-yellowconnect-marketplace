<body class="bg-surface-container-highest flex items-center justify-center min-h-screen font-body-lg text-on-surface">

<!-- Transactional Header -->

<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors text-on-surface">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
<div class="flex flex-col items-center justify-center">
<h1 class="font-title-md text-title-md text-on-surface">Scan ID Document</h1>
<span class="font-label-caps text-label-caps text-on-surface-variant mt-0.5 tracking-wider uppercase">Step 2 of 3</span>
</div>
<div class="w-10 h-10"></div> <!-- Spacer for balance -->

</header>
<!-- Camera View Area -->

<!-- Simulated Camera Feed -->
<div class="absolute inset-0 bg-cover bg-center opacity-70 scale-105" data-alt="A slightly out-of-focus, top-down view of a modern wooden desk surface, simulating a live smartphone camera feed searching for a document. The lighting is neutral, bright, and professional, characteristic of a high-trust verification environment." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBPvnx_ePvPTAZrsTNLKccUQEPmrvlUyZD4fZCzZ0zKsHcI1xEEgz5Ua0dEN-4QjTRYlY2mpmBbYqY1Qv6vR3hgK7uyy3UIsLOhqrLyHQjPChx_WACPwKO1OcIFQvRhc-hh-_v6Jo4fa_HlwoDhS-beVIEoOwHVyg704SOJ1vfn0So1KZCtVtZixRc9KsSlZRNtQ7lxc2fumb8urqbRKtWHmlVNWHFlaLByXRwkp8klddftJwpTpxEYfhZqbxOLgJghGL2LjyGytxc');">
</div>
<!-- Dimming Overlay & Cutout -->
<div class="relative w-[85%] aspect-[1.586/1] max-w-sm z-10 flex items-center justify-center" style="box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.65);">
<!-- Inner transparent frame to clearly show the ID -->
<div class="absolute inset-0 border-[1.5px] border-white/30 rounded-xl"></div>
<!-- Corner Guides -->
<!-- Top Left -->
<div class="absolute -top-[2px] -left-[2px] w-10 h-10 border-t-4 border-l-4 border-primary-container rounded-tl-[14px]"></div>
<!-- Top Right -->

<!-- Bottom Left -->

<!-- Bottom Right -->
<div class="absolute -bottom-[2px] -right-[2px] w-10 h-10 border-b-4 border-r-4 border-primary-container rounded-br-[14px]"></div>

<div class="absolute top-0 left-0 w-full h-[2px] bg-primary-container opacity-80 shadow-[0_0_8px_2px_rgba(255,204,0,0.5)] z-20" id="scan-line" style="top: 10%;"></div>
</div>

<div class="z-20 mt-10 px-6 py-3 rounded-full bg-black/40 backdrop-blur-md border border-white/10">
<p class="text-center text-white font-body-lg text-body-lg drop-shadow-md">

                </p>
</div>
<!-- Security Badge -->
<div class="absolute bottom-6 flex items-center gap-1.5 text-white/70 bg-black/30 px-3 py-1 rounded-full backdrop-blur-sm z-20">

</button>

</div>

<!-- Simple script for scan line animation -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const scanLine = document.getElementById('scan-line');
            let position = 0;
            let direction = 1;

            function animateScan() {
                if(position >= 95) direction = -1;
                if(position <= 5) direction = 1;
                
                position += direction * 0.5;
                scanLine.style.top = `${position}%`;
                requestAnimationFrame(animateScan);
            }
            
            animateScan();
        });
    </script>
