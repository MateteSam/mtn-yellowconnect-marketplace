<body class="bg-background text-on-background min-h-screen font-body-lg text-body-lg antialiased">
<!-- TopAppBar (From JSON) -->
<header class="bg-surface shadow-md fixed top-0 left-0 w-full z-50 flex items-center justify-between px-container-margin-mobile h-16">
<button class="text-primary hover:bg-surface-container-highest transition-colors rounded-full p-2 active:scale-95 transition-transform flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-on-surface">Merchant Central</h1>
<button class="text-on-surface-variant hover:bg-surface-container-highest transition-colors rounded-full p-2 active:scale-95 transition-transform flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Content Canvas -->
<!-- Navigation BottomNavBar is suppressed due to "Task-Focused Details/Settings" rule -->
<main class="pt-[88px] pb-section-gap px-container-margin-mobile md:px-container-margin-desktop max-w-[800px] mx-auto">
<!-- Page Title -->
<div class="mb-gutter flex items-center gap-4">
<button class="text-on-surface-variant hover:bg-surface-container-highest p-2 rounded-full transition-colors flex items-center justify-center -ml-2" onclick="history.back()">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h2 class="font-headline-lg text-headline-lg md:font-display-lg md:text-display-lg text-on-surface">Payout Frequency</h2>
</div>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-section-gap max-w-prose">
            Configure how often your settled funds are transferred to your linked bank account.
        </p>
<!-- Next Scheduled Payout Card (Glassmorphic / Tonal) -->
<div class="bg-secondary-container text-on-secondary-container rounded-xl p-gutter md:p-6 mb-section-gap shadow-sm relative overflow-hidden">
<!-- Decorative subtle gradient -->
<div class="absolute top-0 right-0 w-32 h-32 bg-secondary opacity-10 rounded-full blur-2xl -mr-10 -mt-10 pointer-events-none"></div>
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-[18px]" data-icon="schedule">schedule</span>
<span class="font-label-caps text-label-caps uppercase tracking-wider opacity-90">Next Scheduled Payout</span>
</div>
<div class="font-display-lg text-display-lg font-bold mb-1 tracking-tight">
                $4,250.00
            </div>
<div class="font-body-sm text-body-sm opacity-80 flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]" data-icon="event">event</span>
                Expected arrival: Tomorrow, Oct 25
            </div>
</div>
<!-- Frequency Selection Group -->
<form class="space-y-base mb-section-gap" id="frequencyForm">
<h3 class="font-title-md text-title-md text-on-surface mb-4">Select Frequency</h3>
<!-- Daily Option -->
<label class="frequency-option block w-full relative border-2 border-outline-variant bg-surface rounded-xl p-gutter cursor-pointer transition-all hover:bg-surface-container-low" data-value="daily">
<input class="peer sr-only" name="payout_frequency" type="radio" value="daily"/>
<div class="flex items-start gap-4">
<div class="mt-1 flex-shrink-0 text-primary">
<span class="material-symbols-outlined text-3xl" data-icon="today">today</span>
</div>
<div class="flex-grow">
<div class="font-title-md text-title-md text-on-surface">Daily</div>
<div class="font-body-sm text-body-sm text-on-surface-variant mt-1">Funds transferred every business day. Standard processing fees apply.</div>
</div>
<div class="radio-indicator flex-shrink-0 w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center transition-colors">
<div class="inner-circle w-3 h-3 rounded-full bg-primary scale-0 transition-transform"></div>
</div>
</div>
</label>
<!-- Weekly Option (Default Selected) -->
<label class="frequency-option block w-full relative border-2 border-primary bg-primary-container/10 rounded-xl p-gutter cursor-pointer transition-all" data-value="weekly">
<input checked="" class="peer sr-only" name="payout_frequency" type="radio" value="weekly"/>
<div class="flex items-start gap-4">
<div class="mt-1 flex-shrink-0 text-primary">
<span class="material-symbols-outlined text-3xl" data-icon="view_week">view_week</span>
</div>
<div class="flex-grow">
<div class="font-title-md text-title-md text-on-surface flex items-center gap-2">
                            Weekly
                            <span class="bg-primary-container text-on-primary-container font-label-caps text-label-caps px-2 py-0.5 rounded-full uppercase">Recommended</span>
</div>
<div class="font-body-sm text-body-sm text-on-surface-variant mt-1">Funds transferred every Monday. Lower processing fees.</div>
</div>
<div class="radio-indicator flex-shrink-0 w-6 h-6 rounded-full border-2 border-primary flex items-center justify-center transition-colors">
<div class="inner-circle w-3 h-3 rounded-full bg-primary scale-100 transition-transform"></div>
</div>
</div>
</label>
<!-- Monthly Option -->
<label class="frequency-option block w-full relative border-2 border-outline-variant bg-surface rounded-xl p-gutter cursor-pointer transition-all hover:bg-surface-container-low" data-value="monthly">
<input class="peer sr-only" name="payout_frequency" type="radio" value="monthly"/>
<div class="flex items-start gap-4">
<div class="mt-1 flex-shrink-0 text-primary">
<span class="material-symbols-outlined text-3xl" data-icon="calendar_month">calendar_month</span>
</div>
<div class="flex-grow">
<div class="font-title-md text-title-md text-on-surface">Monthly</div>
<div class="font-body-sm text-body-sm text-on-surface-variant mt-1">Funds transferred on the 1st of every month. Zero processing fees.</div>
</div>
<div class="radio-indicator flex-shrink-0 w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center transition-colors">
<div class="inner-circle w-3 h-3 rounded-full bg-primary scale-0 transition-transform"></div>
</div>
</div>
</label>

<!-- Action Area -->
<div class="pt-base border-t border-surface-variant">
<button class="w-full md:w-auto md:min-w-[200px] float-right bg-primary-container text-on-primary-container font-title-md text-title-md py-3 px-6 rounded-full hover:bg-primary hover:text-on-primary transition-colors active:scale-95 duration-150 flex items-center justify-center gap-2" type="button">
<span>Save Changes</span>
</button>
<div class="clear-both"></div>
</div>
</main>
<!-- Micro-interaction script for Radio Buttons -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const options = document.querySelectorAll('.frequency-option');
            
            options.forEach(option => {
                const input = option.querySelector('input[type="radio"]');
                
                input.addEventListener('change', () => {
                    // Reset all
                    options.forEach(opt => {
                        opt.classList.remove('border-primary', 'bg-primary-container/10');
                        opt.classList.add('border-outline-variant', 'bg-surface');
                        const indicator = opt.querySelector('.radio-indicator');
                        indicator.classList.remove('border-primary');
                        indicator.classList.add('border-outline-variant');
                        opt.querySelector('.inner-circle').classList.remove('scale-100');
                        opt.querySelector('.inner-circle').classList.add('scale-0');
                    });

                    // Set active
                    if(input.checked) {
                        option.classList.remove('border-outline-variant', 'bg-surface');
                        option.classList.add('border-primary', 'bg-primary-container/10');
                        const indicator = option.querySelector('.radio-indicator');
                        indicator.classList.remove('border-outline-variant');
                        indicator.classList.add('border-primary');
                        option.querySelector('.inner-circle').classList.remove('scale-0');
                        option.querySelector('.inner-circle').classList.add('scale-100');
                    }
                });
            });
        });
    </script>
