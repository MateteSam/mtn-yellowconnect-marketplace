<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Export Successful - MTN Compliance Center</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#e5e2e1",
                        "secondary-fixed": "#d6e3ff",
                        "tertiary": "#006874",
                        "surface-container": "#f0edec",
                        "surface-tint": "#745b00",
                        "on-error": "#ffffff",
                        "error": "#ba1a1a",
                        "primary-fixed": "#ffe08b",
                        "on-surface-variant": "#4e4632",
                        "primary-fixed-dim": "#f1c100",
                        "on-error-container": "#93000a",
                        "primary-container": "#ffcc00",
                        "surface-container-high": "#ebe7e7",
                        "on-tertiary-fixed-variant": "#004f57",
                        "inverse-on-surface": "#f3f0ef",
                        "tertiary-fixed-dim": "#00daf0",
                        "inverse-primary": "#f1c100",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-container": "#6f5700",
                        "on-primary-fixed-variant": "#584400",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed-dim": "#aac7ff",
                        "on-secondary-container": "#003c7c",
                        "on-tertiary-container": "#00646e",
                        "on-secondary-fixed": "#001b3e",
                        "on-background": "#1c1b1b",
                        "secondary": "#1f5dae",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e5e2e1",
                        "inverse-surface": "#313030",
                        "on-tertiary-fixed": "#001f24",
                        "on-primary-fixed": "#241a00",
                        "surface-bright": "#fcf9f8",
                        "on-secondary-fixed-variant": "#00458d",
                        "primary": "#745b00",
                        "outline-variant": "#d2c5ab",
                        "secondary-container": "#76a9ff",
                        "outline": "#80765f",
                        "surface-dim": "#dcd9d9",
                        "tertiary-fixed": "#95f1ff",
                        "tertiary-container": "#00e7fe",
                        "surface-container-low": "#f6f3f2",
                        "surface": "#fcf9f8",
                        "error-container": "#ffdad6",
                        "on-surface": "#1c1b1b",
                        "background": "#fcf9f8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-gap": "48px",
                        "gutter": "16px",
                        "container-margin-desktop": "40px",
                        "container-margin-mobile": "16px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "title-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-caps": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "title-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Subtle entrance animation for the success icon */
        @keyframes scaleIn {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-scale-in {
            animation: scaleIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Decorative background elements -->
<div class="absolute inset-0 pointer-events-none overflow-hidden flex justify-center items-center z-0">
<div class="w-[600px] h-[600px] bg-primary-fixed opacity-10 rounded-full blur-3xl mix-blend-multiply"></div>
<div class="absolute w-[400px] h-[400px] bg-secondary-fixed opacity-20 rounded-full blur-3xl mix-blend-multiply translate-x-1/2 translate-y-1/4"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-md px-gutter flex flex-col items-center text-center">
<!-- Success Icon -->
<div class="mb-8 w-24 h-24 rounded-full bg-surface-container-high flex items-center justify-center shadow-sm animate-scale-in border border-outline-variant">
<span class="material-symbols-outlined text-[64px] text-tertiary" data-icon="check_circle">check_circle</span>
</div>
<!-- Typography Block -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-4">
            Export Successful
        </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-10 px-4">
            Your 2023 Annual Tax Summary has been securely packaged and sent to your registered email address.
        </p>
<!-- Actions -->
<div class="w-full flex flex-col gap-4">
<!-- Primary Action (MTN Yellow) -->
<button class="w-full h-14 bg-primary-container text-on-primary-container font-title-md text-title-md rounded-full shadow-md hover:bg-primary hover:text-on-primary transition-all duration-200 flex items-center justify-center gap-2 active:scale-[0.98]">
<span class="material-symbols-outlined" data-icon="shield_person" data-weight="fill">shield_person</span>
                Back to Compliance Center
            </button>
<!-- Secondary Action (MTN Blue) -->
<button class="w-full h-14 bg-secondary text-on-secondary font-title-md text-title-md rounded-full shadow-sm hover:opacity-90 transition-all duration-200 flex items-center justify-center gap-2 active:scale-[0.98]">
<span class="material-symbols-outlined" data-icon="download">download</span>
                Download Again
            </button>
</div>
<!-- Optional: Small legal/security reassurance -->
<div class="mt-8 flex items-center gap-2 text-on-surface-variant opacity-70">
<span class="material-symbols-outlined text-[16px]" data-icon="lock">lock</span>
<span class="font-label-caps text-label-caps">Secured by MTN Enterprise Trust</span>
</div>
</main>
</body></html>
