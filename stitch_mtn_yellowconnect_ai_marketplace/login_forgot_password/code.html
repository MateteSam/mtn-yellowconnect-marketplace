<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password - MTN Marketplace</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                        "on-tertiary-fixed-variant": "#004f57",
                        "on-tertiary-container": "#00646e",
                        "secondary": "#1f5dae",
                        "on-surface": "#1c1b1b",
                        "surface-bright": "#fcf9f8",
                        "surface-container-low": "#f6f3f2",
                        "on-error": "#ffffff",
                        "outline-variant": "#d2c5ab",
                        "on-secondary-fixed": "#001b3e",
                        "surface-variant": "#e5e2e1",
                        "on-primary": "#ffffff",
                        "inverse-surface": "#313030",
                        "surface-container": "#f0edec",
                        "on-background": "#1c1b1b",
                        "tertiary": "#006874",
                        "secondary-container": "#76a9ff",
                        "background": "#fcf9f8",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#ffe08b",
                        "on-primary-fixed-variant": "#584400",
                        "tertiary-fixed-dim": "#00daf0",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed": "#d6e3ff",
                        "on-secondary": "#ffffff",
                        "surface": "#fcf9f8",
                        "primary": "#745b00",
                        "outline": "#80765f",
                        "on-primary-container": "#6f5700",
                        "error": "#ba1a1a",
                        "primary-fixed-dim": "#f1c100",
                        "tertiary-container": "#00e7fe",
                        "surface-container-highest": "#e5e2e1",
                        "surface-dim": "#dcd9d9",
                        "tertiary-fixed": "#95f1ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-gap": "48px",
                        "container-margin-desktop": "40px",
                        "gutter": "16px",
                        "container-margin-mobile": "16px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Inter"],
                        "headline-lg": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "title-md": ["Inter"],
                        "label-caps": ["Inter"],
                        "body-sm": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],

<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col justify-center items-center px-container-margin-mobile antialiased">
<!-- Decorative Top Element -->
<div class="fixed top-0 left-0 w-full h-2 bg-primary-container z-50"></div>
<main class="w-full max-w-md bg-surface p-8 rounded-xl shadow-lg border border-outline-variant/30 flex flex-col gap-6 relative overflow-hidden">
<!-- Glassmorphic Background Effect -->
<div class="absolute top-0 right-0 w-64 h-64 bg-primary-container/10 rounded-full blur-3xl -z-10 translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>
<!-- Header Section -->
<div class="flex flex-col items-center text-center gap-4">
<!-- Brand Logo Substitute -->
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center shadow-md mb-2">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="lock_reset" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
</div>
<h1 class="text-headline-lg-mobile font-headline-lg-mobile text-on-surface">Forgot Password?</h1>
<p class="text-body-sm font-body-sm text-on-surface-variant max-w-[280px]">
                Don't worry! It happens. Please enter the phone number or email address associated with your account.
            </p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-5 w-full mt-2" onsubmit="event.preventDefault(); alert('Reset link sent!');">
<div class="flex flex-col gap-2">
<label class="text-label-caps font-label-caps text-on-surface-variant uppercase tracking-wider" for="recovery-input">Phone Number or Email</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg text-body-lg font-body-lg text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors" id="recovery-input" placeholder="e.g. +234 803 000 0000" required="" type="text"/>
</div>
</div>
<!-- AI Enhanced Info Box (Optional flair based on styling guidelines) -->
<div class="bg-secondary-fixed/30 border border-secondary-fixed-dim/50 rounded-lg p-3 flex items-start gap-3 mt-1 backdrop-blur-sm">
<span class="material-symbols-outlined text-secondary text-[18px] mt-0.5" data-icon="info">info</span>
<p class="text-label-caps font-label-caps text-on-secondary-fixed-variant normal-case">
                     We will send you an OTP or a secure link to reset your password.
                 </p>
</div>
<button class="w-full py-3 mt-4 bg-primary-container text-on-primary-container text-title-md font-title-md rounded-lg shadow-sm hover:bg-inverse-primary active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                Send Reset Link
                <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-6 flex justify-center w-full border-t border-outline-variant/30 pt-6">
<a class="text-body-sm font-body-sm text-secondary hover:text-on-secondary-container hover:underline transition-colors flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-[16px]" data-icon="arrow_back">arrow_back</span>
                Back to Login
            </a>
</div>
</main>
</body></html>
