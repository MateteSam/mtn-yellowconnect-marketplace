<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Checkout Success - MTN Gold</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff",
                        "tertiary": "#006874",
                        "surface-dim": "#dcd9d9",
                        "surface-bright": "#fcf9f8",
                        "surface-container": "#f0edec",
                        "on-secondary-fixed": "#001b3e",
                        "primary": "#745b00",
                        "on-surface": "#1c1b1b",
                        "outline-variant": "#d2c5ab",
                        "on-background": "#1c1b1b",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#ebe7e7",
                        "secondary-fixed-dim": "#aac7ff",
                        "on-primary-fixed-variant": "#584400",
                        "on-primary-container": "#6f5700",
                        "surface-container-lowest": "#ffffff",
                        "surface-variant": "#e5e2e1",
                        "on-secondary-fixed-variant": "#00458d",
                        "inverse-surface": "#313030",
                        "inverse-primary": "#f1c100",
                        "on-tertiary-container": "#00646e",
                        "secondary-container": "#76a9ff",
                        "surface-container-highest": "#e5e2e1",
                        "outline": "#80765f",
                        "primary-fixed": "#ffe08b",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed-variant": "#004f57",
                        "tertiary-fixed-dim": "#00daf0",
                        "surface": "#fcf9f8",
                        "background": "#fcf9f8",
                        "error-container": "#ffdad6",
                        "surface-tint": "#745b00",
                        "secondary": "#1f5dae",
                        "on-tertiary-fixed": "#001f24",
                        "tertiary-fixed": "#95f1ff",
                        "inverse-on-surface": "#f3f0ef",
                        "surface-container-low": "#f6f3f2",
                        "on-secondary-container": "#003c7c",
                        "secondary-fixed": "#d6e3ff",
                        "primary-container": "#ffcc00",
                        "tertiary-container": "#00e7fe",
                        "on-primary-fixed": "#241a00",
                        "primary-fixed-dim": "#f1c100",
                        "on-surface-variant": "#4e4632",
                        "on-error-container": "#93000a",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "container-margin-mobile": "16px",
                        "container-margin-desktop": "40px",
                        "section-gap": "48px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "body-sm": ["Inter"],
                        "title-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-caps": ["Inter"]
                    },
                    "fontSize": {
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "title-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }]
                    },
                    keyframes: {
                        shimmer: {
                            '100%': { transform: 'translateX(100%)' },
                        },
                        pop: {
                            '0%': { transform: 'scale(0.8)', opacity: '0' },
                            '40%': { transform: 'scale(1.1)', opacity: '1' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    },
                    animation: {
                        'shimmer': 'shimmer 2.5s infinite',
                        'pop-in': 'pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'floating': 'float 6s ease-in-out infinite',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col relative overflow-hidden">
<!-- Ambient Background Lighting -->
<div class="fixed top-0 left-1/2 -translate-x-1/2 w-[150vw] h-[707px] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-primary-container/30 via-surface to-surface -z-10 pointer-events-none"></div>
<main class="flex-1 flex flex-col items-center px-container-margin-mobile pt-16 pb-8 w-full max-w-[480px] mx-auto z-10 transition-opacity duration-700 ease-in-out" id="mtn-gold-success-component">
<!-- Hero Celebration -->
<div class="flex flex-col items-center text-center animate-pop-in opacity-0" style="animation-delay: 0.1s;">
<!-- Large Gold Checkmark with glow -->
<div class="relative w-32 h-32 flex items-center justify-center mb-6 animate-floating">
<div class="absolute inset-0 bg-primary-container rounded-full blur-xl opacity-60"></div>
<div class="relative w-24 h-24 bg-gradient-to-br from-primary-fixed to-primary flex items-center justify-center rounded-full shadow-lg border-4 border-surface">
<span class="material-symbols-outlined text-[64px] text-on-primary-fixed" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<!-- Decorative Sparkles -->
<span class="material-symbols-outlined absolute -top-2 -right-4 text-primary animate-pulse" style="font-size: 24px;">colors_spark</span>
<span class="material-symbols-outlined absolute bottom-4 -left-6 text-primary-fixed-dim animate-pulse" style="font-size: 20px; animation-delay: 0.5s;">colors_spark</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2 tracking-tight">
                Welcome to <br/>
<span class="text-primary font-display-lg text-display-lg block mt-1">MTN Gold, Alex!</span>
</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-xs mt-2">
                Your payment was successful. You are now officially a premium merchant.
            </p>
</div>
<!-- The Gold Badge Display -->
<div class="w-full mt-10 mb-8 animate-pop-in opacity-0" style="animation-delay: 0.3s;">
<div class="bg-surface-container-lowest rounded-xl p-6 shadow-[0_8px_24px_rgba(116,91,0,0.1)] border border-outline-variant relative overflow-hidden flex flex-col items-center">
<!-- Shimmer highlight -->
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/60 to-transparent -translate-x-full animate-shimmer"></div>
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-4xl text-on-primary-container" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
</div>
<h2 class="font-title-md text-title-md text-on-surface text-center">Gold Status Activated</h2>
<div class="flex items-center gap-1 mt-2 bg-surface-container-high px-3 py-1 rounded-full">
<span class="material-symbols-outlined text-[16px] text-tertiary">verified</span>
<span class="font-label-caps text-label-caps text-on-surface uppercase">Benefits Unlocked</span>
</div>
</div>
</div>
<!-- Next Steps Section -->
<div class="w-full flex flex-col gap-4 animate-pop-in opacity-0" style="animation-delay: 0.5s;">
<h3 class="font-title-md text-title-md text-on-surface-variant mb-1">Your next steps</h3>
<!-- Action 1: Standard Boost Action -->
<button class="w-full text-left bg-surface rounded-xl p-4 flex items-center gap-4 border border-outline-variant shadow-sm hover:bg-surface-container-lowest hover:shadow-md transition-all group">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center shrink-0 group-hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-on-secondary-container">rocket_launch</span>
</div>
<div class="flex-1">
<h4 class="font-title-md text-title-md text-on-surface">Boost your first listing</h4>
<p class="font-body-sm text-body-sm text-on-surface-variant">Use your free monthly credit.</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
<!-- Action 2: AI Enhanced Action (Glassmorphic) -->
<button class="w-full text-left bg-surface/80 backdrop-blur-md rounded-xl p-4 flex items-center gap-4 ai-glass-border shadow-sm hover:shadow-md transition-all group relative overflow-hidden">
<div class="w-12 h-12 rounded-full bg-gradient-to-br from-secondary to-tertiary-container flex items-center justify-center shrink-0 shadow-inner group-hover:scale-105 transition-transform z-10">
<span class="material-symbols-outlined text-on-secondary" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<div class="flex-1 z-10">
<div class="flex items-center gap-2">
<h4 class="font-title-md text-title-md text-on-surface">View your AI insights</h4>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant">Analyze market trends &amp; pricing.</p>
</div>
<span class="material-symbols-outlined text-tertiary group-hover:translate-x-1 transition-transform z-10">chevron_right</span>
</button>
</div>
<!-- Spacer to push button to bottom if screen is tall -->
<div class="flex-1 min-h-[48px]"></div>
<!-- Primary Action -->
<div class="w-full mt-auto animate-pop-in opacity-0" style="animation-delay: 0.7s;">
<button class="w-full bg-primary text-on-primary-fixed-variant font-title-md text-title-md py-4 rounded-xl shadow-lg active:scale-95 transition-transform flex justify-center items-center gap-2">
                Go to Seller Dashboard
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="font-body-sm text-body-sm text-center text-on-surface-variant mt-4">
                A receipt has been sent to your email.
            </p>
</div>
</main>
<!-- Simple inline script for confetti effect on load -->
</body></html>
