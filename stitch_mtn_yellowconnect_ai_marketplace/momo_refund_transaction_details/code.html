        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background min-h-screen font-body-lg text-body-lg flex flex-col md:hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Custom Top App Bar for Details View -->
<header class="flex items-center justify-between px-container-margin-mobile h-16 w-full sticky top-0 bg-surface shadow-sm z-40">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full active:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-title-md text-title-md text-on-surface absolute left-1/2 -translate-x-1/2">Transaction Details</h1>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 flex flex-col p-container-margin-mobile pb-8 overflow-y-auto">
<!-- Transaction Header -->
<section class="flex flex-col items-center justify-center mt-8 mb-section-gap">
<div class="w-20 h-20 bg-tertiary-container rounded-full flex items-center justify-center mb-4 shadow-sm">
<span class="material-symbols-outlined text-on-tertiary-container" data-icon="keyboard_return" style="font-size: 40px; font-variation-settings: 'FILL' 1;">keyboard_return</span>
</div>
<!-- Using tertiary color as a proxy for success to stay within design tokens -->
<h2 class="font-display-lg text-display-lg text-tertiary mb-3 tracking-tight">+$1,099.00</h2>
<div class="bg-surface-container-high text-on-surface px-4 py-1.5 rounded-full flex items-center gap-2 shadow-sm border border-outline-variant/30">
<span class="material-symbols-outlined text-tertiary" data-icon="check_circle" style="font-size: 16px; font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-label-caps text-label-caps tracking-widest text-on-surface-variant">COMPLETED</span>
</div>
</section>
<!-- Transaction Details Bento-style Card -->
<section class="bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.03)] border border-outline-variant/20 p-5 mb-section-gap flex flex-col gap-5 relative overflow-hidden">
<!-- Subtle decorative background element for modern feel -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container/10 rounded-bl-full -z-0 pointer-events-none"></div>
<div class="flex justify-between items-start z-10 border-b border-surface-variant pb-4">
<div class="flex flex-col gap-1 w-1/3">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">From</span>
</div>
<div class="flex flex-col items-end gap-1 w-2/3 text-right">
<span class="font-body-lg text-body-lg text-on-surface font-semibold">Marketplace Merchant</span>
</div>
</div>
<div class="flex justify-between items-start z-10 border-b border-surface-variant pb-4">
<div class="flex flex-col gap-1 w-1/3">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">To</span>
</div>
<div class="flex flex-col items-end gap-1 w-2/3 text-right">
<span class="font-body-lg text-body-lg text-on-surface">MTN Mobile Money</span>
<span class="font-body-sm text-body-sm text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined" data-icon="credit_card" style="font-size: 14px;">credit_card</span>
                        **** 4567
                    </span>
</div>
</div>
<div class="flex justify-between items-start z-10 border-b border-surface-variant pb-4">
<div class="flex flex-col gap-1 w-1/3">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Date</span>
</div>
<div class="flex flex-col items-end gap-1 w-2/3 text-right">
<span class="font-body-lg text-body-lg text-on-surface">Oct 28, 2024</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">14:32 PM GMT</span>
</div>
</div>
<div class="flex justify-between items-start z-10 border-b border-surface-variant pb-4">
<div class="flex flex-col gap-1 w-1/3">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Transaction ID</span>
</div>
<div class="flex flex-col items-end gap-1 w-2/3 text-right">
<span class="font-body-sm text-body-sm text-on-surface font-mono bg-surface-variant/50 px-2 py-0.5 rounded">MOMO-9821-REF</span>
</div>
</div>
<div class="flex justify-between items-start z-10">
<div class="flex flex-col gap-1 w-1/3">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Reference</span>
</div>
<div class="flex flex-col items-end gap-1 w-2/3 text-right">
<span class="font-body-sm text-body-sm text-on-surface font-mono">Return #RTN-84920-X</span>
</div>
</div>
</section>
<!-- Actions -->
<section class="mt-auto flex flex-col gap-4">
<button class="w-full bg-surface-container-high text-on-surface font-title-md text-title-md py-4 rounded-full flex items-center justify-center gap-2 hover:bg-surface-variant active:scale-[0.98] transition-all shadow-sm">
<span class="material-symbols-outlined" data-icon="share">share</span>
                Share Receipt
            </button>
<button class="w-full bg-primary-container text-on-primary-container font-title-md text-title-md py-4 rounded-full hover:bg-primary-fixed active:scale-[0.98] transition-all shadow-md">
                Back to Wallet
            </button>
</section>
