<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Payout Success</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-bright": "#fcf9f8",
                      "on-secondary": "#ffffff",
                      "surface": "#fcf9f8",
                      "error": "#ba1a1a",
                      "primary": "#745b00",
                      "on-background": "#1c1b1b",
                      "secondary": "#1f5dae",
                      "tertiary-fixed-dim": "#00daf0",
                      "on-surface-variant": "#4e4632",
                      "on-tertiary-fixed": "#001f24",
                      "primary-fixed-dim": "#f1c100",
                      "on-primary-fixed-variant": "#584400",
                      "on-secondary-fixed": "#001b3e",
                      "on-secondary-container": "#003c7c",
                      "on-tertiary-fixed-variant": "#004f57",
                      "error-container": "#ffdad6",
                      "surface-tint": "#745b00",
                      "on-secondary-fixed-variant": "#00458d",
                      "on-primary": "#ffffff",
                      "background": "#fcf9f8",
                      "secondary-fixed-dim": "#aac7ff",
                      "outline": "#80765f",
                      "primary-fixed": "#ffe08b",
                      "inverse-primary": "#f1c100",
                      "on-error-container": "#93000a",
                      "on-surface": "#1c1b1b",
                      "surface-dim": "#dcd9d9",
                      "surface-container-low": "#f6f3f2",
                      "on-tertiary": "#ffffff",
                      "on-primary-container": "#6f5700",
                      "tertiary": "#006874",
                      "tertiary-container": "#00e7fe",
                      "outline-variant": "#d2c5ab",
                      "on-error": "#ffffff",
                      "inverse-on-surface": "#f3f0ef",
                      "secondary-container": "#76a9ff",
                      "surface-container-highest": "#e5e2e1",
                      "on-primary-fixed": "#241a00",
                      "tertiary-fixed": "#95f1ff",
                      "primary-container": "#ffcc00",
                      "inverse-surface": "#313030",
                      "surface-container-lowest": "#ffffff",
                      "surface-variant": "#e5e2e1",
                      "surface-container-high": "#ebe7e7",
                      "surface-container": "#f0edec",
                      "secondary-fixed": "#d6e3ff",
                      "on-tertiary-container": "#00646e"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "container-margin-desktop": "40px",
                      "base": "8px",
                      "section-gap": "48px",
                      "gutter": "16px",
                      "container-margin-mobile": "16px"
              },
              "fontFamily": {
                      "title-md": ["Inter", "sans-serif"],
                      "label-caps": ["Inter", "sans-serif"],
                      "body-sm": ["Inter", "sans-serif"],
                      "headline-lg-mobile": ["Inter", "sans-serif"],
                      "display-lg": ["Inter", "sans-serif"],
                      "headline-lg": ["Inter", "sans-serif"],
                      "body-lg": ["Inter", "sans-serif"]
              },
              "fontSize": {
                      "title-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                      "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                      "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                      "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                      "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                      "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                      "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
              },
              "animation": {
                  'pop-in': 'popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                  'fade-up': 'fadeUp 0.6s ease-out forwards'
              },
              "keyframes": {
                  popIn: {
                      '0%': { transform: 'scale(0)', opacity: '0' },
                      '100%': { transform: 'scale(1)', opacity: '1' }
                  },
                  fadeUp: {
                      '0%': { transform: 'translateY(20px)', opacity: '0' },
                      '100%': { transform: 'translateY(0)', opacity: '1' }
                  }
              }
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        /* Staggered animation delays */
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-bright text-on-surface min-h-screen flex items-center justify-center p-container-margin-mobile md:p-container-margin-desktop antialiased">
<!-- Main Content Canvas (No Nav Shell as per transactional rules) -->
<main class="w-full max-w-[420px] flex flex-col items-center justify-center opacity-0 animate-fade-up">
<!-- Success Animation & Header -->
<div class="flex flex-col items-center text-center mb-8">
<div class="w-24 h-24 rounded-full bg-primary-container/20 flex items-center justify-center mb-6 scale-0 animate-pop-in delay-100">
<span class="material-symbols-outlined text-primary text-[64px]" data-icon="check_circle">check_circle</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-2">Withdrawal Initiated</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Your request has been successfully submitted.</p>
</div>
<!-- Amount Display -->
<div class="mb-section-gap text-center scale-0 animate-pop-in delay-200">
<span class="font-label-caps text-label-caps text-on-surface-variant block mb-2">PAYOUT AMOUNT</span>
<div class="font-display-lg text-display-lg text-on-surface">R 12,500.00</div>
</div>
<!-- Details Card (Glassmorphic subtle hint for premium feel) -->
<div class="w-full bg-surface-container-lowest rounded-xl p-6 shadow-sm border border-outline-variant/30 mb-8 opacity-0 animate-fade-up delay-300">
<div class="space-y-6">
<!-- Destination -->
<div class="flex justify-between items-center">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-secondary-container/20 flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="account_balance">account_balance</span>
</div>
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Destination</span>
<span class="font-body-lg text-body-lg font-semibold text-on-surface">Standard Bank •••• 4092</span>
</div>
</div>
</div>
<div class="h-px w-full bg-surface-variant"></div>
<!-- Estimated Arrival -->
<div class="flex justify-between items-center">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-tertiary-container/20 flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined" data-icon="event_available">event_available</span>
</div>
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Estimated Arrival</span>
<span class="font-body-lg text-body-lg font-semibold text-on-surface">Oct 24, 2023</span>
</div>
</div>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-4 opacity-0 animate-fade-up delay-300">
<!-- Primary Action: MTN Yellow Style -->
<button class="w-full bg-primary-container text-on-primary-fixed font-title-md text-title-md py-4 rounded-full flex items-center justify-center transition-transform active:scale-[0.98] hover:bg-primary-fixed">
                Back to Wallet
            </button>
<!-- Secondary Action: MTN Blue Style -->
<button class="w-full bg-secondary text-on-secondary font-title-md text-title-md py-4 rounded-full flex items-center justify-center transition-transform active:scale-[0.98] hover:bg-on-secondary-fixed-variant">
                View Transaction Details
            </button>
</div>
</main>
</body></html>
